<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>GEMA – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4f6fb;
  --surface:#ffffff;
  --border:#e2e7f0;
  --border2:#cdd4e4;
  --text:#111827;
  --text2:#374151;
  --muted:#6b7280;
  --muted2:#9ca3af;
  --accent:#2563eb;
  --accent-dk:#1d4ed8;
  --accent-bg:#eff4ff;
  --red:#dc2626;
  --red-bg:#fef2f2;
  --green:#16a34a;
  --r:12px;
  --r-sm:8px;
  --r-lg:18px;
  --sans:"DM Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:0 20px 60px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  -webkit-font-smoothing:antialiased;
}
/* Background pattern */
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(37,99,235,.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(37,99,235,.03) 0%, transparent 50%);
}

/* Login card */
.login-card{
  position:relative;z-index:1;
  width:100%;max-width:380px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg);
  overflow:hidden;
}

/* Header with gradient */
.login-hd{
  padding:32px 32px 28px;
  background:linear-gradient(135deg,#0a2a5c 0%,#1d4ed8 55%,#3b82f6 100%);
  text-align:center;
  position:relative;
  overflow:hidden;
}
.login-hd::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 40%,rgba(255,255,255,.08) 0%,transparent 60%);
}
.login-logo{
  width:64px;height:64px;
  margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.login-logo svg{width:64px;height:64px;}
.login-brand{
  font-size:22px;font-weight:900;color:#fff;
  letter-spacing:1px;
  position:relative;z-index:1;
}
.login-sub{
  font-size:12px;color:rgba(255,255,255,.55);
  margin-top:4px;font-weight:500;
  position:relative;z-index:1;
}

/* Body */
.login-body{padding:28px 32px 32px;}

.login-label{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:6px;display:block;
}
.login-input{
  width:100%;
  padding:10px 14px;
  border:1.5px solid var(--border2);
  border-radius:var(--r-sm);
  background:var(--surface);
  color:var(--text);
  font-size:14px;
  font-family:var(--sans);
  outline:none;
  transition:.15s;
}
.login-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.login-input::placeholder{color:#cbd5e1;}
.login-input.error{
  border-color:var(--red);
  box-shadow:0 0 0 3px rgba(220,38,38,.08);
}

.login-btn{
  width:100%;
  padding:11px 20px;
  margin-top:18px;
  border:none;
  border-radius:var(--r-sm);
  background:var(--accent);
  color:#fff;
  font-size:14px;
  font-weight:700;
  font-family:var(--sans);
  cursor:pointer;
  transition:.2s;
  box-shadow:0 2px 8px rgba(37,99,235,.25);
}
.login-btn:hover{
  background:var(--accent-dk);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(37,99,235,.3);
}
.login-btn:active{
  transform:translateY(0);
}
.login-btn:disabled{
  opacity:.5;cursor:not-allowed;transform:none;
}

.login-error{
  margin-top:12px;
  padding:8px 12px;
  border-radius:var(--r-sm);
  background:var(--red-bg);
  border:1px solid #fecaca;
  color:var(--red);
  font-size:12px;
  font-weight:600;
  display:none;
  text-align:center;
}
.login-error.show{display:block;}

.login-footer{
  margin-top:16px;
  text-align:center;
  font-size:10.5px;
  color:var(--muted2);
  line-height:1.5;
}

/* Shake animation for error */
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%,60%{transform:translateX(-6px);}
  40%,80%{transform:translateX(6px);}
}
.shake{animation:shake .4s ease;}

/* Success state */
.login-success{
  text-align:center;
  padding:24px;
}
.login-success-ic{
  font-size:40px;margin-bottom:12px;
}
.login-success-txt{
  font-size:14px;font-weight:700;color:var(--green);
}

/* Already logged in */
.login-logged{
  text-align:center;padding:20px 32px 28px;
}
.login-logged-txt{font-size:13px;color:var(--muted);margin-bottom:14px;}
.login-logged-btns{display:flex;gap:8px;}
.login-logged-btns button{
  flex:1;padding:9px 14px;border-radius:var(--r-sm);
  font-size:13px;font-weight:700;font-family:var(--sans);
  cursor:pointer;transition:.15s;
}
.btn-continue{
  background:var(--accent);color:#fff;border:none;
  box-shadow:0 2px 8px rgba(37,99,235,.2);
}
.btn-continue:hover{background:var(--accent-dk);}
.btn-logout{
  background:var(--surface);color:var(--text2);
  border:1.5px solid var(--border2);
}
.btn-logout:hover{background:var(--bg);}
</style>
<link rel="stylesheet" href="gema_responsive.css"/>
</head>
<body>

<div class="login-card" id="loginCard">

  <!-- Header -->
  <div class="login-hd">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="83 199 174 168"  preserveAspectRatio="xMidYMid meet"><defs><clipPath id="lg_c1"><path d="M 29 17 L 145 17 L 145 151 L 29 151 Z" clip-rule="nonzero"/></clipPath><clipPath id="lg_c2"><path d="M 58.367188 0.613281 L 173.855469 67.289062 L 116.105469 167.3125 L 0.621094 100.636719 Z" clip-rule="nonzero"/></clipPath><clipPath id="lg_c3"><path d="M 73 47.414062 L 123.597656 47.414062 L 123.597656 98 L 73 98 Z" clip-rule="nonzero"/></clipPath><clipPath id="lg_c4"><rect x="0" width="174" y="0" height="168"/></clipPath></defs><g transform="matrix(1,0,0,1,83,199)"><g clip-path="url(#lg_c4)"><g clip-path="url(#lg_c1)"><g clip-path="url(#lg_c2)"><path fill="#000000" d="M 144.929688 50.640625 L 144.929688 117.292969 L 87.207031 150.617188 L 29.484375 117.292969 L 29.484375 50.640625 L 87.207031 17.3125 Z" fill-opacity="1" fill-rule="nonzero"/></g></g></g><path fill="#ffffff" d="M 98.042969 73.117188 C 96.210938 71.285156 93.945312 69.882812 91.488281 69.070312 C 85.503906 75.054688 85.019531 75.28125 84.257812 77.097656 C 90.328125 76.699219 95.191406 82.253906 93.839844 88.324219 C 93.011719 92.078125 84.535156 99.5 76.90625 107.300781 C 73.34375 110.933594 67.460938 110.898438 63.863281 107.300781 C 60.265625 103.703125 60.265625 97.855469 63.863281 94.257812 L 71.992188 86.128906 C 70.988281 82.390625 71.214844 78.445312 72.476562 74.933594 L 57.203125 90.210938 C 50.664062 96.75 50.664062 107.40625 57.203125 113.960938 C 63.757812 120.515625 74.378906 120.515625 80.953125 113.960938 L 98.042969 96.871094 C 104.550781 90.363281 104.652344 79.726562 98.042969 73.117188 Z" fill-opacity="1" fill-rule="nonzero"/><g clip-path="url(#lg_c3)"><path fill="#ffffff" d="M 118.835938 76.078125 C 122.003906 72.910156 123.75 68.691406 123.75 64.210938 C 123.75 54.9375 116.242188 47.414062 106.953125 47.414062 C 102.472656 47.414062 98.253906 49.160156 95.085938 52.324219 C 90.8125 56.597656 82.     </div>
    <div class="login-brand">GEMA</div>
    <div class="login-sub">Gebäudemanagement · Engineering Tools</div>
  </div>

  <!-- Login Form -->
  <div class="login-body" id="loginForm">
    <div style="margin-bottom:14px">
      <label class="login-label" for="usr">Benutzername</label>
      <input class="login-input" id="usr" type="text" placeholder="Benutzername" autofocus autocomplete="username"/>
    </div>
    <label class="login-label" for="pw">Passwort</label>
    <input class="login-input" id="pw" type="password" placeholder="Passwort eingeben" autocomplete="current-password"/>
    <div style="display:flex;align-items:center;gap:8px;margin:10px 0 4px">
      <input type="checkbox" id="rememberMe" style="width:16px;height:16px;cursor:pointer">
      <label for="rememberMe" style="font-size:12px;color:var(--muted);cursor:pointer">30 Tage angemeldet bleiben</label>
    </div>
    <div class="login-error" id="loginError">Falscher Benutzername oder Passwort.</div>
    <button class="login-btn" id="loginBtn" type="button">Anmelden</button>
    <div class="login-footer">GEMA Engineering Suite · Geschützter Bereich</div>
  </div>

  <!-- Success (hidden) -->
  <div class="login-body" id="loginSuccess" style="display:none;">
    <div class="login-success">
      <div class="login-success-ic">✓</div>
      <div class="login-success-txt" id="successTxt">Erfolgreich angemeldet</div>
    </div>
  </div>

  <!-- Already logged in (hidden) -->
  <div id="loggedInView" style="display:none;">
    <div class="login-logged">
      <div class="login-logged-txt" id="loggedTxt">Du bist bereits angemeldet.</div>
      <div class="login-logged-btns">
        <button class="btn-logout" onclick="doLogout()">Abmelden</button>
        <button class="btn-continue" id="continueBtn">→ Weiter zu GEMA</button>
      </div>
    </div>
  </div>

</div>

<script src="gema_auth.js"></script>
<script>
(function(){
  var s = GemaAuth.getSession();
  var params = new URLSearchParams(location.search);
  var redirect = params.get('r') || 'index.html';
  var inviteToken = params.get('invite') || '';

  // Einladungs-Modus: Registrierung oder bestehender Account
  if(inviteToken){
    // Prüfe ob Token gültig ist und ob Account bereits existiert
    var users=GemaAuth.getUsers()||[];
    var invUser=users.find(function(u){return u.einladung&&u.einladung.token===inviteToken;});
    var invEmail=invUser&&invUser.profile?invUser.profile.email:'';
    var invName=invUser?invUser.name:'';
    var invFirma=invUser&&invUser.profile?invUser.profile.firma:'';

    // Fall 1: Token bereits aktiviert (Passwort schon gesetzt)
    if(invUser&&invUser.einladung&&invUser.einladung.passwortGesetzt){
      document.getElementById('loginForm').innerHTML=
        '<h2 style="font-size:20px;font-weight:800;margin-bottom:8px;text-align:center">Bereits registriert</h2>'+
        '<p style="font-size:13px;color:#6b7280;text-align:center;margin-bottom:20px">Sie haben bereits ein Konto. Bitte melden Sie sich an.</p>'+
        '<button onclick="location.href=\'sys_login.html\'" style="width:100%;padding:12px;border:none;border-radius:10px;background:#1d4ed8;color:#fff;font-size:14px;font-weight:700;cursor:pointer">→ Zum Login</button>';
      return;
    }

    // Fall 2: Neuer Account — Registrierungsformular
    document.getElementById('loginForm').innerHTML=
      '<h2 style="font-size:20px;font-weight:800;margin-bottom:8px;text-align:center">Willkommen bei GEMA</h2>'+
      '<p style="font-size:13px;color:#6b7280;text-align:center;margin-bottom:20px">Sie wurden eingeladen. Vervollständigen Sie Ihr Profil um loszulegen.</p>'+
      '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px">Name</label><input type="text" id="invName" class="login-input" placeholder="Vor- und Nachname" value="'+(invName&&invName!=='Eingeladener'&&invName!=='Lieferant'?invName:'')+'"/></div>'+
      '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px">Firma</label><input type="text" id="invFirma" class="login-input" placeholder="Firmenname" value="'+(invFirma||'')+'"/></div>'+
      '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px">E-Mail</label><input type="email" id="invEmail" class="login-input" value="'+(invEmail||'')+'" style="background:#f8fafc;color:#6b7280" readonly/></div>'+
      '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px">Passwort wählen</label><input type="password" id="invPw1" class="login-input" placeholder="Mind. 4 Zeichen"/></div>'+
      '<div style="margin-bottom:12px"><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px">Passwort bestätigen</label><input type="password" id="invPw2" class="login-input"/></div>'+
      '<div id="invError" style="color:#dc2626;font-size:12px;margin-bottom:8px;display:none"></div>'+
      '<button onclick="activateInvite()" style="width:100%;padding:12px;border:none;border-radius:10px;background:#1d4ed8;color:#fff;font-size:14px;font-weight:700;cursor:pointer">Zugang aktivieren</button>'+
      '<div style="margin-top:16px;padding:12px;background:#eff4ff;border-radius:8px;font-size:12px;color:#1d4ed8;line-height:1.5;text-align:center"><strong>30 Tage kostenlos testen</strong> — Alle Features freigeschaltet. Danach entscheiden Sie.</div>';
    window.activateInvite=function(){
      var name=document.getElementById('invName').value.trim();
      var firma=document.getElementById('invFirma').value.trim();
      var pw1=document.getElementById('invPw1').value;
      var pw2=document.getElementById('invPw2').value;
      var err=document.getElementById('invError');
      err.style.display='none';
      if(!name){err.textContent='Bitte geben Sie Ihren Namen ein.';err.style.display='';return;}
      if(!pw1||pw1.length<4){err.textContent='Passwort muss mind. 4 Zeichen haben.';err.style.display='';return;}
      if(pw1!==pw2){err.textContent='Passwörter stimmen nicht überein.';err.style.display='';return;}
      var user=GemaAuth.activateInvitation(inviteToken,pw1,{name:name,firma:firma});
      if(!user){err.textContent='Einladungslink ungültig oder abgelaufen.';err.style.display='';return;}
      // Auto-Login + rollenspezifische Weiterleitung
      GemaAuth.login(user.username,pw1,true);
      location.href=GemaAuth.getRedirectForUser(user);
    };
    return;
  }

  if(s){
    var user = GemaAuth.getCurrentUser();
    document.getElementById('loggedInView').style.display='';
    document.getElementById('loginForm').style.display='none';
    if(user){
      document.getElementById('loggedTxt').textContent=
        'Du bist als "'+user.name+'" angemeldet.';
    }
    document.getElementById('continueBtn').onclick=function(){location.href=redirect;};
  }

  function doLogin(){
    var username=document.getElementById('usr').value.trim();
    var pw=document.getElementById('pw').value;
    var remember=document.getElementById('rememberMe').checked;
    var err=document.getElementById('loginError');
    var inp_u=document.getElementById('usr');
    var inp_p=document.getElementById('pw');
    err.classList.remove('show');

    if(!username||!pw){
      err.textContent='Bitte Benutzername und Passwort eingeben.';
      err.classList.add('show');
      return;
    }

    var user = GemaAuth.login(username, pw, remember);
    if(user){
      document.getElementById('loginForm').style.display='none';
      document.getElementById('loginSuccess').style.display='';
      document.getElementById('successTxt').textContent='Willkommen, '+user.name+'!';
      // Rollenspezifische Weiterleitung
      var dest=redirect;
      if(redirect==='index.html'||!redirect){
        dest=GemaAuth.getRedirectForUser(user);
      }
      setTimeout(function(){ location.href=dest; }, 700);
    } else {
      err.textContent='Falscher Benutzername oder Passwort.';
      err.classList.add('show');
      inp_p.classList.add('error','shake');
      inp_p.value=''; inp_p.focus();
      setTimeout(function(){ inp_p.classList.remove('shake'); }, 400);
    }
  }

  function doLogout(){
    GemaAuth.logout();
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('usr').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('pw').focus(); });
  window.doLogout=doLogout;
})();
</script>
<script src="gema_mobile_menu.js"></script>
</body>
</html>
