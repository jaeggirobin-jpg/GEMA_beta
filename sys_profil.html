<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GEMA – Profil & Einstellungen</title>
<script src="gema_auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6fb;--bg2:#edf0f7;--sur:#fff;--brd:#e2e7f0;--brd2:#cdd4e4;--txt:#0f172a;--txt2:#334155;--mut:#64748b;--mut2:#94a3b8;--acc:#2563eb;--acc-dk:#1d4ed8;--acc-bg:#eff6ff;--grn:#16a34a;--grn-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--r:14px;--r-sm:10px;--r-lg:20px;--sh:0 4px 16px rgba(0,0,0,.08);--sh-sm:0 1px 4px rgba(0,0,0,.06);--sans:"DM Sans",ui-sans-serif,system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--sans);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:var(--sans)}
.g-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--brd);box-shadow:var(--sh-sm);height:52px;display:flex;align-items:center;padding:0 24px;gap:12px}
.g-nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.g-nav-mark{height:28px;display:flex;align-items:center;}

.g-nav-bc{display:flex;align-items:center;gap:4px;flex:1;font-size:12.5px}
.g-nav-bc a{color:var(--mut);text-decoration:none;padding:3px 6px;border-radius:6px}.g-nav-bc a:hover{background:var(--bg2)}
.g-nav-bc .sep{color:var(--mut2)}.g-nav-bc .cur{color:var(--txt);font-weight:700}
.page{max-width:720px;margin:0 auto;padding:32px 24px}
.page-title{font-size:24px;font-weight:900;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--mut);margin-bottom:28px}
.card{background:var(--sur);border-radius:var(--r);border:1.5px solid var(--brd);box-shadow:var(--sh-sm);margin-bottom:20px;overflow:hidden}
.card-hd{padding:16px 22px;border-bottom:1.5px solid var(--brd);display:flex;align-items:center;gap:10px}
.card-hd h3{font-size:15px;font-weight:800}
.card-hd .ic{font-size:20px}
.card-body{padding:22px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.fg label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)}
.fg input,.fg select{padding:10px 14px;border:1.5px solid var(--brd2);border-radius:var(--r-sm);font-size:14px;color:var(--txt);background:var(--sur);outline:none;transition:.15s}
.fg input:focus,.fg select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg input::placeholder{color:#cbd5e1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--r-sm);border:1.5px solid var(--brd2);background:var(--sur);color:var(--txt2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:.15s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--acc);border-color:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc-dk)}
.btn-danger{background:var(--red-bg);border-color:#fecaca;color:var(--red)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--brd)}
.toggle-row:last-child{border-bottom:none}
.toggle-row-info{flex:1}
.toggle-row-label{font-size:14px;font-weight:700}
.toggle-row-desc{font-size:12px;color:var(--mut);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--brd2);cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--acc)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:.2s}
.toggle.on::after{left:22px}
/* Logo upload */
.logo-area{display:flex;align-items:center;gap:20px;padding:16px 0}
.logo-preview{width:80px;height:80px;border-radius:var(--r-sm);border:2px dashed var(--brd2);display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg);flex-shrink:0;cursor:pointer;transition:.15s}
.logo-preview:hover{border-color:var(--acc)}
.logo-preview img{width:100%;height:100%;object-fit:contain}
.logo-preview .ph{font-size:28px;color:var(--mut2)}
.avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none}
#toast.show{opacity:1}
@media(max-width:600px){.grid2{grid-template-columns:1fr}.page{padding:20px 16px}}
.gema-feedback-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;font-family:inherit}
.gema-feedback-btn:hover{background:#b91c1c}
</style>
</head>

<div class="page">
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:28px">
    <div class="avatar" id="userAvatar" style="background:#2563eb">?</div>
    <div>
      <div class="page-title" id="userName">—</div>
      <div class="page-sub" id="userRole" style="margin-bottom:0">—</div>
    </div>
  </div>

  <!-- PROFIL -->
  <div class="card">
    <div class="card-hd"><span class="ic">👤</span><h3>Persönliche Daten</h3></div>
    <div class="card-body">
      <div class="grid2">
        <div class="fg"><label>Anzeigename</label><input id="pName" type="text" placeholder="Vor- und Nachname"></div>
        <div class="fg"><label>Benutzername</label><input id="pUsername" type="text" disabled style="background:var(--bg);color:var(--mut)"></div>
      </div>
      <div class="grid2">
        <div class="fg"><label>E-Mail</label><input id="pEmail" type="email" placeholder="name@firma.ch"></div>
        <div class="fg"><label>Telefon</label><input id="pTel" type="tel" placeholder="+41 ..."></div>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">✓ Profil speichern</button>
    </div>
  </div>

  <!-- PASSWORT -->
  <div class="card">
    <div class="card-hd"><span class="ic">🔑</span><h3>Passwort ändern</h3></div>
    <div class="card-body">
      <div class="grid2">
        <div class="fg"><label>Neues Passwort</label><input id="pPw1" type="password" placeholder="Mind. 4 Zeichen"></div>
        <div class="fg"><label>Passwort wiederholen</label><input id="pPw2" type="password" placeholder="Wiederholen"></div>
      </div>
      <div style="color:var(--red);font-size:12px;font-weight:700;min-height:16px;margin-bottom:8px" id="pwErr"></div>
      <button class="btn" onclick="changePassword()">Passwort ändern</button>
    </div>
  </div>

  <!-- EINSTELLUNGEN -->
  <div class="card">
    <div class="card-hd"><span class="ic">⚙</span><h3>Einstellungen</h3></div>
    <div class="card-body">
      <div class="grid2" style="margin-bottom:16px">
        <div class="fg"><label>Sprache</label>
          <select id="pSprache">
            <option value="de">🇩🇪 Deutsch</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="it">🇮🇹 Italiano</option>
          </select>
        </div>
        <div class="fg"><label>Einheiten (Berechnungen)</label>
          <select id="pEinheiten">
            <option value="metrisch">Metrisch (m, l, bar)</option>
            <option value="imperial">Imperial (ft, gal, psi)</option>
          </select>
        </div>
      </div>
      <div class="toggle-row">
        <div class="toggle-row-info">
          <div class="toggle-row-label">E-Mail Benachrichtigungen</div>
          <div class="toggle-row-desc">Bei Statusänderungen in Ausschreibungen, Mängeln etc.</div>
        </div>
        <div class="toggle" id="togBenachrichtigung" onclick="this.classList.toggle('on')"></div>
      </div>
      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="saveSettings()">✓ Einstellungen speichern</button>
      </div>
    </div>
  </div>

  <!-- Unternehmen wird nur via Benutzerverwaltung (Admin) verwaltet -->
</div>

<div id="toast"></div>

<script>
var _user=null, _org=null;

function init(){
  _user = GemaAuth.getCurrentUser();
  if(!_user) return;
  _org = GemaAuth.getCurrentOrg();

  // Avatar
  var initials = (_user.name||_user.username).split(' ').map(function(s){return s[0];}).join('').substring(0,2).toUpperCase();
  var roles = GemaAuth.getRoles()||[];
  var roleColor = '#6b7280';
  if(_user.roleIds&&_user.roleIds.length){
    var fr=roles.find(function(r){return r.id===_user.roleIds[0];});
    if(fr) roleColor=fr.color;
  }
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userAvatar').style.background = roleColor;
  document.getElementById('userName').textContent = _user.name||_user.username;
  var roleNames = (_user.roleIds||[]).map(function(rid){var r=roles.find(function(x){return x.id===rid;});return r?r.name:'';}).filter(Boolean).join(', ');
  document.getElementById('userRole').textContent = roleNames + (_org&&_org.name!=='Mein Unternehmen'?' · '+_org.name:'');

  // Profile fields
  document.getElementById('pName').value = _user.name||'';
  document.getElementById('pUsername').value = _user.username||'';
  var prof = _user.profile||{};
  document.getElementById('pEmail').value = prof.email||'';
  document.getElementById('pTel').value = prof.telefon||'';
  document.getElementById('pSprache').value = prof.sprache||'de';
  document.getElementById('pEinheiten').value = prof.einheiten||'metrisch';
  if(prof.benachrichtigungen) document.getElementById('togBenachrichtigung').classList.add('on');
}

function saveProfile(){
  if(!_user) return;
  var users = GemaAuth.getUsers()||[];
  var idx = users.findIndex(function(u){return u.id===_user.id;});
  if(idx<0) return;
  users[idx].name = document.getElementById('pName').value.trim()||users[idx].username;
  users[idx].profile = users[idx].profile||{};
  users[idx].profile.email = document.getElementById('pEmail').value.trim();
  users[idx].profile.telefon = document.getElementById('pTel').value.trim();
  GemaAuth.saveUsers(users);
  toast('✓ Profil gespeichert');
  document.getElementById('userName').textContent = users[idx].name;
}

function saveSettings(){
  if(!_user) return;
  GemaAuth.updateProfile(_user.id, {
    sprache: document.getElementById('pSprache').value,
    einheiten: document.getElementById('pEinheiten').value,
    benachrichtigungen: document.getElementById('togBenachrichtigung').classList.contains('on')
  });
  toast('✓ Einstellungen gespeichert');
}

function changePassword(){
  var pw1 = document.getElementById('pPw1').value;
  var pw2 = document.getElementById('pPw2').value;
  var err = document.getElementById('pwErr');
  if(!pw1||pw1.length<4){err.textContent='Passwort muss mind. 4 Zeichen haben.';return;}
  if(pw1!==pw2){err.textContent='Passwörter stimmen nicht überein.';return;}
  var users = GemaAuth.getUsers()||[];
  var idx = users.findIndex(function(u){return u.id===_user.id;});
  if(idx<0) return;
  users[idx].password = GemaAuth.hash(pw1);
  GemaAuth.saveUsers(users);
  err.textContent='';
  document.getElementById('pPw1').value='';
  document.getElementById('pPw2').value='';
  toast('✓ Passwort geändert');
}

var _tt;
function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},2500);}

document.addEventListener('DOMContentLoaded', init);
</script>
<script src="gema_feedback.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){if(typeof GemaFeedback!=='undefined')GemaFeedback.init('profil','Profil');});</script>
<script src="gema_scroll.js"></script>
</body>
