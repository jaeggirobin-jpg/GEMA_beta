<style>
:root{--bg:#f4f6fb;--bg2:#edf0f7;--sur:#fff;--sur2:#f8faff;--brd:#e2e7f0;--brd2:#cdd4e4;--txt:#0f172a;--txt2:#334155;--mut:#6b7280;--mut2:#9ca3af;--red:#ee6300;--red-bg:#fff7ed;--red-bd:#fed7aa;--acc:#ee6300;--r:14px;--r-sm:9px;--r-lg:20px;--sh:0 4px 16px rgba(0,0,0,.08);--sh-sm:0 1px 4px rgba(0,0,0,.06);--sans:"DM Sans",ui-sans-serif,system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--sans);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:var(--sans)}
.g-nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--brd);box-shadow:var(--sh-sm)}
.nav-in{max-width:1100px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center}
.g-nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:14px;flex-shrink:0}
.g-nav-mark{height:28px;display:flex;align-items:center;}

.g-nav-bc{display:flex;align-items:center;gap:2px;flex:1;font-size:12.5px}
.g-nav-bc a{color:var(--mut);text-decoration:none;padding:3px 7px;border-radius:6px;font-weight:600}
.g-nav-bc a:hover{background:var(--bg2)}.g-nav-bc .sep{color:var(--mut2);padding:0 2px}.g-nav-bc .cur{color:var(--txt);font-weight:700}
.g-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--brd2);background:var(--sur);color:var(--txt2);font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none}.g-nav-btn:hover{background:var(--bg2)}
.g-page{max-width:1100px;margin:0 auto;padding:24px}

/* Project bar */
.project-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;background:var(--sur);border-radius:var(--r);padding:14px 18px;border:1.5px solid var(--brd);box-shadow:var(--sh-sm)}
.pf{display:flex;flex-direction:column;gap:4px}
.pf label{font-size:10px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center}
.pf input,.pf select{padding:7px 10px;border:1.5px solid var(--brd2);border-radius:8px;font-size:13px;font-weight:600;color:var(--txt);background:var(--sur);outline:none;height:auto}
.pf input:focus,.pf select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(238,99,0,.1)}
input::placeholder,textarea::placeholder{color:#cbd5e1!important}
.pf label a:hover{text-decoration:none!important}

/* Obj combo */
.obj-combo{display:flex;flex-direction:column;gap:4px}
.obj-combo-row{display:flex;gap:6px;align-items:center}
.obj-combo select{flex:1;padding:7px 10px;border:1.5px solid var(--brd2);border-radius:8px;font-size:13px;color:var(--txt);background:var(--sur);outline:none;font-weight:600;height:auto}
.obj-combo-toggle{font-size:10px;font-weight:700;color:var(--acc);cursor:pointer;background:none;border:none;padding:0;text-decoration:none;white-space:nowrap;margin-left:auto}
.obj-combo-toggle:hover{opacity:.7}

/* Form sections */
.form-section{background:var(--sur);border-radius:var(--r);border:1.5px solid var(--brd);box-shadow:var(--sh-sm);margin-bottom:16px;overflow:hidden}
.form-section-hd{padding:14px 20px;background:var(--bg2);border-bottom:1.5px solid var(--brd);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.form-section-hd:hover{background:var(--brd)}
.form-section-num{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.form-section-title{font-size:14px;font-weight:800;flex:1}
.form-section-arrow{font-size:12px;color:var(--mut);transition:.2s}
.form-section.collapsed .form-section-body{display:none}
.form-section.collapsed .form-section-arrow{transform:rotate(-90deg)}
.form-section-body{padding:20px}

/* Field groups */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1.5px solid var(--brd2);border-radius:var(--r-sm);font-size:14px;color:var(--txt);background:var(--sur);outline:none;transition:.15s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(238,99,0,.1)}
.fg textarea{min-height:80px;resize:vertical}
.fg .hint{font-size:11px;color:var(--mut2);margin-top:2px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.stamm-hint{font-size:10px;color:var(--acc);font-weight:600;margin-left:auto}

/* Contact blocks */
.contact-block{background:var(--sur2);border:1.5px solid var(--brd);border-radius:var(--r-sm);padding:14px;margin-bottom:10px}
.contact-block-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cb-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cb-fields .fg{margin-bottom:0}

@media(max-width:700px){.project-bar,.grid2,.grid3,.cb-fields{grid-template-columns:1fr}}
@media print{.g-nav,.g-nav-btn,.no-print,.project-bar{display:none!important}.g-page{padding:0;max-width:100%}}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none}
#toast.show{opacity:1}
.gema-feedback-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;font-family:inherit}
.gema-feedback-btn:hover{background:#b91c1c}
</style>

var currentForm=null;
function renderForm(formKey){
  var def=FORMS[formKey];
  if(!def){document.getElementById('formContainer').innerHTML='<div style="text-align:center;padding:60px;color:var(--mut)"><h2>Formular nicht gefunden</h2><p>Unbekannter Formulartyp: '+formKey+'</p><a href="br_vkf_formulare.html" style="color:var(--acc)">← Zurück</a></div>';return;}
  currentForm=def;
  document.title='GEMA – '+def.title;
  document.getElementById('navTitle').textContent=def.title;
  var html='<div style="margin-bottom:16px;font-size:12px;color:var(--mut)">'+def.icon+' <strong>Sprinkleranlage</strong> — '+esc(def.sub)+'</div>';
  def.sections.forEach(function(sec){
    html+='<div class="form-section" id="sec_'+sec.num+'">';
    html+='<div class="form-section-hd" onclick="toggleSection('+sec.num+')">';
    html+='<div class="form-section-num">'+sec.num+'</div>';
    html+='<div class="form-section-title">'+esc(sec.title)+'</div>';
    if(sec.rolle) html+='<span class="stamm-hint">aus Stammdaten</span>';
    html+='<span class="form-section-arrow">▼</span>';
    html+='</div>';
    html+='<div class="form-section-body"><div class="grid2">';
    sec.fields.forEach(function(f){
      var cls=f.full?'full':'';
      html+='<div class="fg '+cls+'">';
      html+='<label for="'+f.id+'">'+esc(f.label)+'</label>';
      if(f.type==='select'){
        html+='<select id="'+f.id+'"'+(f.onchange?' onchange="'+f.onchange+'(this)"':'')+'>';
        html+='<option value="">– wählen –</option>';
        var opts=f.options||[];
        if(f.options_ref) opts=REF[f.options_ref].map(function(x){return x.n||x;});
        opts.forEach(function(o){html+='<option value="'+esc(o)+'">'+esc(o)+'</option>';});
        html+='</select>';
      } else if(f.type==='textarea'){
        html+='<textarea id="'+f.id+'" placeholder="'+(f.hint||'')+'"></textarea>';
      } else {
        html+='<input type="'+(f.type||'text')+'" id="'+f.id+'"'+(f.inputmode?' inputmode="'+f.inputmode+'"':'')+' placeholder="">';
      }
      if(f.hint&&f.type!=='textarea') html+='<div class="hint">'+esc(f.hint)+'</div>';
      html+='</div>';
    });
    html+='</div></div></div>';
  });
  document.getElementById('formContainer').innerHTML=html;
}

function toggleSection(num){
  var el=document.getElementById('sec_'+num);
  if(el) el.classList.toggle('collapsed');
}
window.toggleSection=toggleSection;

function fillBehoerde(sel){
  var kt=sel.value;
  var target=document.getElementById('bsBehoerdeName');
  if(!target) return;
  target.innerHTML='<option value="">– wählen –</option>';
  REF.behoerden.filter(function(b){return b.k===kt;}).forEach(function(b){
    target.innerHTML+='<option value="'+esc(b.n)+'">'+esc(b.n)+'</option>';

}
window.fillBehoerde=fillBehoerde;

// ── Fill from Objekt-Stammdaten ──
function fillFromObjekt(){
  if(typeof GemaObjekte==='undefined') return;
  var sel=document.getElementById('metaObjektDropdown');
  if(!sel||!sel.value) return;
  var objId=sel.value;
  var o=GemaObjekte.getAll().find(function(x){return x.id===objId;});
  if(!o) return;
  // Gebäude
  setVal('gebObjekt',o.name||'');
  setVal('gebStrasse',o.strasse||'');
  setVal('gebOrt',[o.plz,o.ort].filter(Boolean).join(' '));
  setVal('gebKanton',o.gemeinde||'');
  // Beteiligte
  var bet=GemaObjekte.getBeteiligte(objId);
  var mappings=[
    {rolle:'Bauherrschaft',prefix:'eig'},
    {rolle:'Sanitärplaner',prefix:'planer'},
    {rolle:'Unternehmer / Installateur',prefix:'errichter'},
    {rolle:'Architekt / Generalplaner',prefix:'vert'},
  ];
  mappings.forEach(function(m){
    var b=bet.find(function(x){return x.rolle===m.rolle;});
    if(b){
      setVal(m.prefix+'Firma',b.firma||'');
      setVal(m.prefix+'Strasse',b.strasse||'');
      setVal(m.prefix+'Ort',[b.plz,b.ort].filter(Boolean).join(' '));
      setVal(m.prefix+'Person',[b.vorname,b.name].filter(Boolean).join(' '));
      setVal(m.prefix+'Email',b.email||'');
      setVal(m.prefix+'Tel',b.telefon||'');
    }
  });
}
function setVal(id,v){var el=document.getElementById(id);if(el&&!el.value) el.value=v;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// PROJECT META + OBJEKT COMBO
// ══════════════════════════════════════════
(function(){
  var MK='gema_meta_vkf_formular';
  function saveMeta(){try{var oid=document.getElementById('metaObjektDropdown')?.value||'';localStorage.setItem(MK,JSON.stringify({p:document.getElementById('metaProjekt')?.value||'',b:document.getElementById('metaBearbeiter')?.value||'',d:document.getElementById('metaDatum')?.value||'',oid:oid}));}catch(e){}}
  function loadMeta(){try{var d=JSON.parse(localStorage.getItem(MK));if(d){if(document.getElementById('metaProjekt'))document.getElementById('metaProjekt').value=d.p||'';if(document.getElementById('metaBearbeiter'))document.getElementById('metaBearbeiter').value=d.b||'';if(document.getElementById('metaDatum'))document.getElementById('metaDatum').value=d.d||'';if(d.oid&&document.getElementById('metaObjektDropdown')){document.getElementById('metaObjektDropdown').value=d.oid;_prevObjektId=d.oid;}}}catch(e){}if(!document.getElementById('metaDatum')?.value){document.getElementById('metaDatum').value=new Date().toISOString().slice(0,10);}}
  var _prevObjektId='';
  function populateObjektDropdown(){
    if(typeof GemaObjekte==='undefined') return;
    var sel=document.getElementById('metaObjektDropdown');if(!sel) return;
    var objs=GemaObjekte.getAll(),activeId=GemaObjekte.getActiveId();
    sel.innerHTML='<option value="">\u2013 Objekt w\u00e4hlen \u2013</option>'+objs.map(function(o){return '<option value="'+o.id+'"'+(o.id===activeId?' selected':'')+'>'+(o.name||'\u2013')+(o.ort?' \u00b7 '+o.ort:'')+'</option>';}).join('');
    if(_prevObjektId&&objs.find(function(o){return o.id===_prevObjektId;})){sel.value=_prevObjektId;}
    else if(activeId&&!document.getElementById('metaProjekt').value){sel.value=activeId;_prevObjektId=activeId;onObjektSelect();}
  }
  function onObjektSelect(){
    var sel=document.getElementById('metaObjektDropdown'),inp=document.getElementById('metaProjekt');if(!sel||!inp)return;
    if(sel.value&&typeof GemaObjekte!=='undefined'){var o=GemaObjekte.getAll().find(function(x){return x.id===sel.value;});if(o){var p=[o.name];if(o.strasse)p.push(o.strasse);if(o.plz||o.ort)p.push([o.plz,o.ort].filter(Boolean).join(' '));inp.value=p.join(', ');}}else{inp.value='';}
    _prevObjektId=sel.value;saveMeta();
    fillFromObjekt();
  }
  function toggleObjektInput(f){
    var m=typeof f==='boolean'?f:document.getElementById('objComboManual').style.display==='none';
    document.getElementById('objComboSelect').style.display=m?'none':'flex';
    document.getElementById('objComboManual').style.display=m?'flex':'none';
    document.getElementById('objComboBtn').textContent=m?'Stammdaten':'Freies Objekt';
    if(!m)populateObjektDropdown();
  }
  window.onObjektSelect=onObjektSelect;window.toggleObjektInput=toggleObjektInput;window.populateObjektDropdown=populateObjektDropdown;window.saveMeta=saveMeta;
  document.addEventListener('DOMContentLoaded',function(){
    // Detect form from URL
    var params=new URLSearchParams(location.search);
    var formKey=params.get('form')||'allgemeine_daten';
    renderForm(formKey);
    loadMeta();
    populateObjektDropdown();
    // Autosave
    if(typeof GemaAutoSave!=='undefined') GemaAutoSave.init('vkf_'+formKey);
  });
  window.addEventListener('gema-objekte-loaded',function(){populateObjektDropdown();});
  ['metaProjekt','metaBearbeiter','metaDatum'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',saveMeta);});
})();

// Toast
var _tt;function toast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},2500);}

// Feedback
document.addEventListener('DOMContentLoaded',function(){GemaFeedback.init('vkf_formular','VKF-Formular');});
</script>
