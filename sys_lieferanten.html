<html lang="de">
<head>
<script src="gema_auth.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lieferanten-Verwaltung – GEMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f6fb;--bg2:#edf0f7;--sur:#fff;--brd:#e2e7f0;--brd2:#cdd4e4;--txt:#111827;--txt2:#374151;--mut:#6b7280;--acc:#2563eb;--acc-bg:#eff6ff;--grn:#16a34a;--grn-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--amb:#d97706;--amb-bg:#fffbeb;--r:14px;--r-sm:9px;--r-lg:20px;--sh:0 4px 16px rgba(0,0,0,.08);--sans:"DM Sans",system-ui,sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
input::placeholder,textarea::placeholder{color:#cbd5e1!important}

.g-nav{background:#fff;border-bottom:1.5px solid var(--brd);position:sticky;top:0;z-index:200}
.g-nav-inner{padding:0 24px;height:52px;display:flex;align-items:center;gap:16px}
.g-nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.g-nav-mark{height:28px;display:flex;align-items:center}
.g-nav-bc{display:flex;align-items:center;gap:6px;font-size:13px;margin-left:4px}
.bc-sep{color:#9ca3af}.bc-cat{color:var(--mut);font-weight:500}.bc-cur{color:var(--txt2);font-weight:700}
.g-nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.g-nav-btn{font-size:12px;font-weight:600;color:var(--mut);background:var(--bg2);border:1.5px solid var(--brd);border-radius:8px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s;text-decoration:none}
.g-nav-btn:hover{background:var(--brd);color:var(--txt)}

.g-page{max-width:1100px;margin:0 auto;padding:24px}
.fc{padding:9px 12px;border:1.5px solid var(--brd2);border-radius:var(--r-sm);font-size:13px;color:var(--txt);background:var(--sur);outline:none;width:100%;min-width:0;box-sizing:border-box;transition:.15s}
.fc:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.fc{resize:vertical;min-height:60px;line-height:1.5}
.fl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.fg{margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;padding:8px 16px;transition:.15s;font-family:var(--sans)}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:#1d4ed8}
.btn-g{background:var(--bg2);color:var(--txt2);border:1.5px solid var(--brd)}.btn-g:hover{background:var(--brd)}
.btn-d{background:var(--red-bg);color:var(--red);border:1.5px solid #fecaca}.btn-d:hover{background:#fee2e2}
.btn-s{background:var(--acc-bg);color:var(--acc);border:1.5px solid #bfdbfe}.btn-s:hover{background:#dbeafe}
.btn-w{background:var(--amb-bg);color:var(--amb);border:1.5px solid #fde68a}.btn-w:hover{background:#fef3c7}
.btn-sm{font-size:11px;padding:5px 10px;border-radius:8px}

.card{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.card-hd{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--brd);background:var(--bg)}
.card-hd h3{font-size:14px;font-weight:800;flex:1}
.card-bd{padding:20px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);padding:16px;text-align:center}
.kpi-val{font-size:28px;font-weight:800;color:var(--acc);line-height:1}
.kpi-lbl{font-size:11px;font-weight:700;color:var(--mut);margin-top:6px;text-transform:uppercase;letter-spacing:.05em}

/* Lieferant row */
.lief-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--brd);cursor:pointer;transition:.12s}
.lief-row:hover{background:var(--bg)}
.lief-row:last-child{border-bottom:none}
.lief-logo{width:40px;height:40px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--acc);flex-shrink:0;overflow:hidden}
.lief-logo img{width:100%;height:100%;object-fit:cover}
.lief-info{flex:1;min-width:0}
.lief-firma{font-size:14px;font-weight:700}
.lief-meta{font-size:12px;color:var(--mut);margin-top:2px}
.lief-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap}
.b-aktiv{background:var(--grn-bg);color:var(--grn);border:1px solid #bbf7d0}
.b-inaktiv{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.b-basis{background:var(--bg2);color:var(--mut);border:1px solid var(--brd)}
.b-premium{background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.b-enterprise{background:#ede9fe;color:#7c3aed;border:1px solid #c4b5fd}
.b-test{background:var(--amb-bg);color:var(--amb);border:1px solid #fde68a}
.b-abgelaufen{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.b-oa{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}

/* Editor overlay */
.editor-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.editor-panel{position:absolute;right:0;top:0;bottom:0;width:640px;max-width:100%;background:var(--sur);overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.12)}
.editor-hd{display:flex;align-items:center;gap:10px;padding:16px 24px;border-bottom:1.5px solid var(--brd);position:sticky;top:0;background:var(--sur);z-index:10}
.editor-hd h2{flex:1;font-size:18px;font-weight:800}
.editor-bd{padding:24px}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1.5px solid var(--brd);margin-bottom:20px}
.tab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:var(--mut);transition:.15s}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab:hover{color:var(--txt)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Toast */
.toast-c{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}

@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}.editor-panel{width:100%}.lief-row{flex-wrap:wrap}}
</style>
</head>

  <!-- KPIs -->

  <!-- Toolbar -->

    <input class="fc" id="search" type="search" placeholder="Lieferant suchen…" style="max-width:280px" oninput="renderList()"/>
    <select class="fc" id="filterStatus" style="max-width:160px" onchange="renderList()">

      <option value="inaktiv">Inaktiv</option>

      <div class="tab-content" id="tc-produkte">

<script>
var current = null; // current lieferant
function E(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

function toast(msg, type){
  var d=document.createElement('div');
  d.style.cssText='padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);'+
    (type==='error'?'background:#dc2626':'background:#059669');
  d.textContent=msg;document.getElementById('toasts').appendChild(d);setTimeout(function(){d.remove()},3000);
}

// ── KPIs ──
function renderKPIs(){
  var all = GemaProdukte.getAllLieferanten();
  var aktiv = all.filter(function(l){return l.status==='aktiv'}).length;
  var premium = all.filter(function(l){return l.premium && l.premium.aktiv}).length;
  var test = all.filter(function(l){return l.abo && l.abo.status==='testphase'}).length;
  var oaOffen = 0;
  try { oaOffen = GemaProdukte.getOffertanfragen({status:'offen'}).length; } catch(e){}
  document.getElementById('kpis').innerHTML =
    '<div class="kpi"><div class="kpi-val">'+all.length+'</div><div class="kpi-lbl">Total Lieferanten</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="color:var(--grn)">'+aktiv+'</div><div class="kpi-lbl">Aktiv</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="color:#f59e0b">'+premium+'</div><div class="kpi-lbl">Premium</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="color:var(--amb)">'+test+'</div><div class="kpi-lbl">Testphase</div></div>'+
    '<div class="kpi"><div class="kpi-val" style="color:#ea580c">'+oaOffen+'</div><div class="kpi-lbl">Offene Anfragen</div></div>';
}

// ── List ──
function renderList(){
  var all = GemaProdukte.getAllLieferanten();
  var q = (document.getElementById('search').value||'').toLowerCase();
  var fs = document.getElementById('filterStatus').value;
  var fa = document.getElementById('filterAbo').value;

  var list = all.filter(function(l){
    if(q && l.firma.toLowerCase().indexOf(q)<0 && (l.kontaktPerson||'').toLowerCase().indexOf(q)<0 && (l.email||'').toLowerCase().indexOf(q)<0) return false;
    if(fs && l.status !== fs) return false;
    if(fa === 'testphase' && (!l.abo || l.abo.status !== 'testphase')) return false;
    if(fa && fa !== 'testphase' && (!l.abo || l.abo.typ !== fa)) return false;
    return true;
  });

  if(!list.length){
    document.getElementById('listBody').innerHTML='<div style="padding:40px;text-align:center;color:var(--mut)"><div style="font-size:32px;margin-bottom:8px">📦</div><div>Keine Lieferanten gefunden.</div><div style="margin-top:12px"><button class="btn btn-p btn-sm" onclick="openNew()">+ Neuer Lieferant</button></div></div>';
    return;
  }

  document.getElementById('listBody').innerHTML = list.map(function(l){
    var aboTyp = (l.abo||{}).typ || 'basis';
    var aboStatus = (l.abo||{}).status || 'aktiv';
    var isPrem = l.premium && l.premium.aktiv;
    var oaCount = 0;
    try { oaCount = GemaProdukte.getOffertanfragenCount(l.id); } catch(e){}
    return '<div class="lief-row" onclick="openLieferant(\''+E(l.id)+'\')">' +
      '<div class="lief-logo">'+(l.logo?'<img src="'+E(l.logo)+'"/>':E(l.firma.charAt(0)))+'</div>'+
      '<div class="lief-info">' +
        '<div class="lief-firma">'+E(l.firma)+(l.rechtsform?' '+E(l.rechtsform):'')+'</div>' +
        '<div class="lief-meta">'+E(l.kontaktPerson||'')+' · '+E(l.email||'')+' · '+E((l.adresse||{}).ort||'')+'</div>' +
      '</div>' +
      '<div class="lief-badges">' +
        '<span class="badge '+(l.status==='aktiv'?'b-aktiv':'b-inaktiv')+'">'+(l.status==='aktiv'?'● Aktiv':'● Inaktiv')+'</span>' +
        '<span class="badge '+(aboTyp==='premium'?'b-premium':aboTyp==='enterprise'?'b-enterprise':'b-basis')+'">'+aboTyp.charAt(0).toUpperCase()+aboTyp.slice(1)+'</span>' +
        (aboStatus==='testphase'?'<span class="badge b-test">Testphase</span>':'') +
        (isPrem?'<span class="badge b-premium">★ Premium</span>':'') +
        (oaCount>0?'<span class="badge b-oa">'+oaCount+' offen</span>':'') +
        '<span style="font-size:11px;color:var(--mut)">'+l.produkteCount+' Produkte · '+l.verifizierteCount+' ✓</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── Editor ──
function openNew(){
  current = null;
  document.getElementById('edTitle').textContent = 'Neuer Lieferant';
  clearEditor();
  document.getElementById('btnDeactivate').style.display='none';
  document.getElementById('btnDelete').style.display='none';
  switchTab('profil');
  document.getElementById('editorOverlay').style.display='block';
}

function openLieferant(id){
  current = GemaProdukte.getLieferant(id);
  if(!current) return;
  document.getElementById('edTitle').textContent = current.firma;
  fillEditor(current);
  document.getElementById('btnDeactivate').style.display='';
  document.getElementById('btnDelete').style.display='';
  document.getElementById('btnDeactivate').textContent = current.status==='aktiv' ? '⏸ Deaktivieren' : '▶ Reaktivieren';
  document.getElementById('btnDeactivate').className = current.status==='aktiv' ? 'btn btn-d btn-sm' : 'btn btn-s btn-sm';
  switchTab('profil');
  renderProdukteListe();
  renderAnfragenListe();
  document.getElementById('editorOverlay').style.display='block';
}

function closeEditor(){
  document.getElementById('editorOverlay').style.display='none';
  renderKPIs(); renderList();
}

function clearEditor(){
  ['edFirma','edRechtsform','edUid','edBranche','edKontakt','edEmail','edTelefon','edWebsite','edStrasse','edPlz','edOrt','edKanton','edBeschreibung'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('edAboTyp').value='basis';
  document.getElementById('edAboStatus').value='testphase';
  document.getElementById('edAboStart').value=new Date().toISOString().split('T')[0];
  document.getElementById('edAboEnde').value='';
  var te=new Date();te.setDate(te.getDate()+30);
  document.getElementById('edTestEnde').value=te.toISOString().split('T')[0];
  document.getElementById('edMahnungen').value='0';
  document.getElementById('edPremAktiv').value='0';
  document.getElementById('edPremPrio').value='100';
  document.getElementById('edPremBadge').value='';
  document.getElementById('edPremKat').value='';
}

function fillEditor(l){
  document.getElementById('edFirma').value=l.firma||'';
  document.getElementById('edRechtsform').value=l.rechtsform||'';
  document.getElementById('edUid').value=l.uid||'';
  document.getElementById('edBranche').value=(l.branche||[]).join(', ');
  document.getElementById('edKontakt').value=l.kontaktPerson||'';
  document.getElementById('edEmail').value=l.email||'';
  document.getElementById('edTelefon').value=l.telefon||'';
  document.getElementById('edWebsite').value=l.website||'';
  var a=l.adresse||{};
  document.getElementById('edStrasse').value=a.strasse||'';
  document.getElementById('edPlz').value=a.plz||'';
  document.getElementById('edOrt').value=a.ort||'';
  document.getElementById('edKanton').value=a.kanton||'';
  document.getElementById('edBeschreibung').value=l.beschreibung||'';
  // Abo
  var abo=l.abo||{};
  document.getElementById('edAboTyp').value=abo.typ||'basis';
  document.getElementById('edAboStatus').value=abo.status||'aktiv';
  document.getElementById('edAboStart').value=abo.startDatum||'';
  document.getElementById('edAboEnde').value=abo.endDatum||'';
  document.getElementById('edTestEnde').value=abo.testphaseEnde||'';
  document.getElementById('edMahnungen').value=String(abo.mahnungen||0);
  // Premium
  var p=l.premium||{};
  document.getElementById('edPremAktiv').value=p.aktiv?'1':'0';
  document.getElementById('edPremPrio').value=String(p.sortPriority||100);
  document.getElementById('edPremBadge').value=p.badge||'';
  document.getElementById('edPremKat').value=(p.kategorien||[]).join(', ');
  // Abo badge
  var aboCls=abo.status==='testphase'?'b-test':abo.status==='aktiv'?'b-aktiv':'b-abgelaufen';
  document.getElementById('aboStatusBadge').className='badge '+aboCls;
  document.getElementById('aboStatusBadge').textContent=abo.status||'—';
}

function saveLieferant(){
  var firma=document.getElementById('edFirma').value.trim();
  if(!firma){toast('Firma ist Pflichtfeld.','error');return;}
  var data={
    firma:firma,
    rechtsform:document.getElementById('edRechtsform').value.trim(),
    uid:document.getElementById('edUid').value.trim(),
    branche:document.getElementById('edBranche').value.split(',').map(function(s){return s.trim()}).filter(Boolean),
    kontaktPerson:document.getElementById('edKontakt').value.trim(),
    email:document.getElementById('edEmail').value.trim(),
    telefon:document.getElementById('edTelefon').value.trim(),
    website:document.getElementById('edWebsite').value.trim(),
    adresse:{strasse:document.getElementById('edStrasse').value.trim(),plz:document.getElementById('edPlz').value.trim(),ort:document.getElementById('edOrt').value.trim(),kanton:document.getElementById('edKanton').value.trim(),land:'CH'},
    beschreibung:document.getElementById('edBeschreibung').value.trim()
  };
  if(current){
    GemaProdukte.updateLieferant(current.id,data);
    current=GemaProdukte.getLieferant(current.id);
    toast('Gespeichert');
  } else {
    current=GemaProdukte.createLieferant(data);
    document.getElementById('edTitle').textContent=current.firma;
    document.getElementById('btnDeactivate').style.display='';
    document.getElementById('btnDelete').style.display='';
    toast('Lieferant erstellt');
  }
  renderKPIs();renderList();
}

function saveAbo(){
  if(!current)return;
  var preis={'basis':1200,'premium':3600,'enterprise':0};
  var typ=document.getElementById('edAboTyp').value;
  GemaProdukte.updateLieferant(current.id,{
    abo:{
      typ:typ,
      status:document.getElementById('edAboStatus').value,
      startDatum:document.getElementById('edAboStart').value,
      endDatum:document.getElementById('edAboEnde').value,
      testphaseEnde:document.getElementById('edTestEnde').value,
      zahlungsart:current.abo?.zahlungsart||'rechnung',
      jahrespreis:preis[typ]||0,
      letzteZahlung:current.abo?.letzteZahlung||'',
      mahnungen:parseInt(document.getElementById('edMahnungen').value)||0
    }
  });
  current=GemaProdukte.getLieferant(current.id);
  fillEditor(current);
  toast('Abo gespeichert');renderKPIs();renderList();
}

function savePremium(){
  if(!current)return;
  GemaProdukte.updateLieferant(current.id,{
    premium:{
      aktiv:document.getElementById('edPremAktiv').value==='1',
      platzierung:document.getElementById('edPremAktiv').value==='1'?'top':'none',
      sortPriority:parseInt(document.getElementById('edPremPrio').value)||100,
      badge:document.getElementById('edPremBadge').value.trim()||'Premium-Partner',
      kategorien:document.getElementById('edPremKat').value.split(',').map(function(s){return s.trim()}).filter(Boolean)
    }
  });
  current=GemaProdukte.getLieferant(current.id);
  fillEditor(current);
  toast('Premium gespeichert');renderKPIs();renderList();
}

function toggleActive(){
  if(!current)return;
  if(current.status==='aktiv'){
    var grund=prompt('Grund für Deaktivierung:');
    if(grund===null)return;
    GemaProdukte.deactivateLieferant(current.id,grund);
    toast('Deaktiviert');
  } else {
    GemaProdukte.activateLieferant(current.id);
    toast('Reaktiviert');
  }
  current=GemaProdukte.getLieferant(current.id);
  fillEditor(current);
  document.getElementById('btnDeactivate').textContent=current.status==='aktiv'?'⏸ Deaktivieren':'▶ Reaktivieren';
  document.getElementById('btnDeactivate').className=current.status==='aktiv'?'btn btn-d btn-sm':'btn btn-s btn-sm';
  renderKPIs();renderList();
}

function deleteLief(){
  if(!current)return;
  if(!confirm('Lieferant "'+current.firma+'" wirklich löschen? Produkte bleiben bestehen.'))return;
  GemaProdukte.deleteLieferant(current.id);
  current=null;
  closeEditor();
  toast('Gelöscht');
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',t.textContent.toLowerCase().indexOf(name)>=0||(['profil','abo','produkte','anfragen'][i]===name));});
  document.querySelectorAll('.tab-content').forEach(function(tc){tc.classList.toggle('active',tc.id==='tc-'+name);});
}

// ── Produkte-Tab ──
function renderProdukteListe(){
  if(!current){document.getElementById('produkteList').innerHTML='';return;}
  var prods=GemaProdukte.getProdukte(null,{lieferantId:current.id})||[];
  // Fallback: search by firma
  if(!prods.length){
    var all=[];
    GemaProdukte.getKategorien().forEach(function(k){all=all.concat(GemaProdukte.getProdukte(k.id));});
    prods=all.filter(function(p){return p.lieferantId===current.id||p.lieferantFirma===current.firma;});
  }
  if(!prods.length){
    document.getElementById('produkteList').innerHTML='<div style="padding:20px;text-align:center;color:var(--mut);font-size:13px">Keine Produkte erfasst. → <a href="sys_produktkatalog.html" style="color:var(--acc)">Produktkatalog</a></div>';
    return;
  }
  document.getElementById('produkteList').innerHTML=prods.map(function(p){
    var st=GemaProdukte.STATUS_LABELS[p.status]||{};
    var cls=p.status==='verifiziert'?'b-aktiv':p.status==='nicht_verifiziert'?'b-inaktiv':'b-basis';
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)">'+
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+E((p.daten||{}).serie||'—')+' '+E((p.daten||{}).modell||'')+'</div>'+
      '<div style="font-size:11px;color:var(--mut)">'+E(p.kategorie||'')+'</div></div>'+
      '<span class="badge '+cls+'">'+E(st.icon||'')+' '+E(st.label||p.status)+'</span></div>';
  }).join('');
  // Update counts
  current.produkteCount=prods.length;
  current.verifizierteCount=prods.filter(function(p){return p.status==='verifiziert'}).length;
}

// ── Anfragen-Tab ──
function renderAnfragenListe(){
  if(!current){document.getElementById('anfragenList').innerHTML='';return;}
  var anf=GemaProdukte.getOffertanfragen({lieferantId:current.id});
  if(!anf.length){
    document.getElementById('anfragenList').innerHTML='<div style="padding:20px;text-align:center;color:var(--mut);font-size:13px">Keine Offertanfragen.</div>';
    return;
  }
  document.getElementById('anfragenList').innerHTML=anf.map(function(a){
    var stCls=a.status==='offen'?'b-test':a.status==='beantwortet'?'b-aktiv':a.status==='abgelehnt'?'b-inaktiv':'b-abgelaufen';
    return '<div style="padding:12px 0;border-bottom:1px solid var(--brd)">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
        '<span class="badge '+stCls+'">'+E(a.status)+'</span>'+
        '<span style="font-size:13px;font-weight:700">'+E(a.produktName||'Allgemein')+'</span>'+
        '<span style="font-size:11px;color:var(--mut);margin-left:auto">'+E(a.erstelltAm?a.erstelltAm.split('T')[0]:'')+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--mut)">'+
        'Von: '+E(a.absenderName||'—')+' ('+E(a.absenderRolle||'')+') · '+E(a.absenderFirma||'')+
        ' · Frist: '+E(a.frist||'—')+
      '</div>'+
      (a.nachricht?'<div style="font-size:12px;color:var(--txt2);margin-top:4px;font-style:italic">«'+E(a.nachricht.substring(0,100))+(a.nachricht.length>100?'…':'')+'»</div>':'')+
      (a.antwort?'<div style="font-size:12px;color:var(--grn);margin-top:4px;font-weight:600">✉ Beantwortet: '+E(a.antwort.nachricht||'').substring(0,80)+'</div>':'')+
    '</div>';
  }).join('');
}

// ── Init ──
renderKPIs();
renderList();
</script>
<script>document.addEventListener('DOMContentLoaded', function(){if(typeof GemaFeedback!=='undefined')GemaFeedback.init('lieferanten', 'Lieferanten-Verwaltung');});</script>
</body>
</html>
