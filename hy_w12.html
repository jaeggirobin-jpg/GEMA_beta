<!doctype html>
<html lang="de">
<head>
<script src="gema_auth.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GEMA – Selbstkontrolle W12</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4f6fb;--bg2:#edf0f7;--surface:#fff;--surface2:#f8faff;
  --border:#e2e7f0;--border2:#cdd4e4;
  --text:#111827;--text2:#374151;--muted:#6b7280;--muted2:#9ca3af;
  --accent:#2563eb;--accent-bg:#eff4ff;--accent-bd:#bfcfff;--accent-dk:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-bd:#fde68a;
  --purple:#7c3aed;--purple-bg:#faf5ff;--purple-bd:#d8b4fe;
  --cyan:#0891b2;--cyan-bg:#ecfeff;--cyan-bd:#a5f3fc;
  --r:12px;--r-sm:8px;--r-lg:18px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 10px 40px rgba(0,0,0,.10);
  --sans:"DM Sans",ui-sans-serif,system-ui,sans-serif;
  --sidebar-w:280px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
input,select,textarea,button{font-family:var(--sans);}
input::placeholder,textarea::placeholder{color:#cbd5e1!important;}

/* ── NAV ── */
.g-nav{position:sticky;top:0;z-index:300;background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);}
.g-nav-inner{padding:0 24px;height:52px;display:flex;align-items:center;}
.g-nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;margin-right:16px;flex-shrink:0;}
.g-nav-mark{height:28px;display:flex;align-items:center;}
.g-nav-bc{display:flex;align-items:center;gap:2px;flex:1;min-width:0;}
.g-nav-bc a,.g-nav-bc span{font-size:12.5px;color:var(--muted);text-decoration:none;padding:4px 7px;border-radius:6px;transition:.12s;white-space:nowrap;}
.g-nav-bc a:hover{background:var(--bg2);color:var(--text);}
.g-nav-bc .bc-cur{color:var(--text);font-weight:700;}
.g-nav-bc .bc-sep{color:var(--muted2);padding:0 2px;}
.g-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.g-nav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s;white-space:nowrap;font-family:var(--sans);}
.g-nav-btn:hover{background:var(--bg2);box-shadow:var(--shadow-sm);}
.gema-feedback-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;font-family:inherit}
.gema-feedback-btn:hover{background:#b91c1c}

/* ── APP SHELL ── */
.app{display:flex;height:calc(100vh - 52px);overflow:hidden;}

/* ── SIDEBAR ── */
.sb{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;}
.sb.collapsed{width:0;border-right:none;overflow:hidden;}
.sb-inner{width:var(--sidebar-w);padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%;}
.sb-title{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sb-field{display:flex;flex-direction:column;gap:3px;}
.sb-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.sb-sel,.sb-inp{padding:7px 10px;border:1.5px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--sans);transition:.15s;width:100%;}
.sb-sel:focus,.sb-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.sb-textarea{padding:7px 10px;border:1.5px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-size:12px;font-family:var(--sans);resize:vertical;min-height:48px;max-height:100px;width:100%;}

/* ── Module Tree ── */
.mod-tree{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.mod-cat{font-size:10px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 3px;border-top:1px solid var(--border);margin-top:4px;}
.mod-cat:first-child{border-top:none;margin-top:0;}
.mod-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:.12s;font-size:12px;font-weight:600;color:var(--text2);user-select:none;}
.mod-item:hover{background:var(--bg2);}
.mod-item.active{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd);}
.mod-item.na{opacity:.4;pointer-events:none;}
.mod-id{font-size:10px;font-weight:800;background:var(--bg2);color:var(--muted);padding:2px 5px;border-radius:4px;min-width:22px;text-align:center;}
.mod-item.active .mod-id{background:var(--accent);color:#fff;}
.mod-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px;}
.mod-prog{font-size:10px;font-weight:700;color:var(--muted2);white-space:nowrap;}
.mod-item.done .mod-prog{color:var(--green);}

/* ── Progress bar ── */
.progress-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px;}
.progress-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
.progress-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;}
.progress-fill.good{background:var(--green);}
.progress-stats{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--muted);font-weight:600;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--surface);border-bottom:1.5px solid var(--border);box-shadow:var(--shadow-sm);flex-shrink:0;}
.topbar-title{font-size:14px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;padding:8px 20px 0;background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0;}
.tab{padding:8px 16px;border-radius:var(--r-sm) var(--r-sm) 0 0;border:1.5px solid transparent;background:transparent;color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--sans);white-space:nowrap;position:relative;bottom:-1.5px;}
.tab.active{background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg);color:var(--accent);}
.tab:not(.active):hover{background:var(--bg2);color:var(--text);}

/* ── TAB CONTENT ── */
.tab-content{flex:1;overflow-y:auto;padding:20px;background:var(--bg);}

/* ── CHECKLIST ── */
.check-group{margin-bottom:20px;}
.check-group-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;}
.check-group-hd:hover{background:var(--surface2);}
.check-group-icon{font-size:14px;}
.check-group-title{font-size:13px;font-weight:700;flex:1;}
.check-group-count{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg2);padding:2px 8px;border-radius:999px;}
.check-group-arrow{font-size:12px;color:var(--muted2);transition:transform .2s;}
.check-group.open .check-group-arrow{transform:rotate(90deg);}
.check-group-body{display:none;border:1.5px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);background:var(--surface);overflow:hidden;}
.check-group.open .check-group-body{display:block;}

.check-row{display:grid;grid-template-columns:36px 1fr auto auto;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .1s;}
.check-row:last-child{border-bottom:none;}
.check-row:hover{background:var(--surface2);}
.check-id{font-size:10.5px;font-weight:800;color:var(--muted);background:var(--bg2);padding:2px 0;border-radius:4px;text-align:center;}
.check-title{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.4;}
.check-status{display:flex;gap:3px;}
.check-status button{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:13px;transition:.15s;display:flex;align-items:center;justify-content:center;}
.check-status button:hover{transform:scale(1.1);}
.check-status button.sel-yes{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.check-status button.sel-partial{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber);}
.check-status button.sel-no{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}
.check-status button.sel-na{background:var(--bg2);border-color:var(--border);color:var(--muted2);}
.check-comment{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--muted2);}
.check-comment:hover{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent);}
.check-comment.has-note{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent);}

/* ── RISK TABLE ── */
.risk-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.risk-table th{padding:8px 12px;background:var(--surface2);color:var(--muted);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;text-align:left;border-bottom:1.5px solid var(--border);}
.risk-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.risk-table tr:last-child td{border-bottom:none;}
.risk-table tr:hover td{background:var(--surface2);}
.risk-sel{padding:4px 8px;border:1.5px solid var(--border2);border-radius:6px;font-size:11.5px;font-family:var(--sans);background:var(--surface);width:100%;}
.risk-score{font-weight:800;font-size:13px;text-align:center;padding:4px 10px;border-radius:6px;min-width:36px;display:inline-block;}
.risk-low{background:var(--green-bg);color:var(--green);}
.risk-med{background:var(--amber-bg);color:var(--amber);}
.risk-high{background:var(--red-bg);color:var(--red);}
.risk-crit{background:#7f1d1d;color:#fff;}

/* ── MEASURE TABLE ── */
.measure-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.measure-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.measure-id{font-size:10px;font-weight:800;background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:4px;}
.measure-title{font-size:13px;font-weight:700;flex:1;}
.measure-prio{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;}
.measure-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ── SYSTEM REVIEW ── */
.review-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.review-title{font-size:13px;font-weight:700;margin-bottom:8px;}
.review-q{font-size:12.5px;color:var(--text2);margin-bottom:6px;line-height:1.5;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:auto;}
.modal-box{background:var(--surface);border-radius:var(--r-lg);border:1.5px solid var(--border);box-shadow:var(--shadow-lg);width:100%;max-width:480px;overflow:hidden;}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.modal-hd-title{font-size:14px;font-weight:800;}
.modal-close{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:.15s;}
.modal-close:hover{background:var(--red-bg);color:var(--red);}
.modal-body{padding:14px 18px;}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--surface2);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--sans);white-space:nowrap;}
.btn:hover{background:var(--bg2);}
.btn.primary{background:var(--accent);border-color:var(--accent-dk);color:#fff;}
.btn.primary:hover{background:var(--accent-dk);}
.btn.green{background:var(--green);border-color:#15803d;color:#fff;}
.btn.sm{padding:5px 10px;font-size:11.5px;}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);text-align:center;gap:12px;}
.empty-icon{font-size:48px;opacity:.3;}
.empty-text{font-size:14px;line-height:1.6;}

/* ── TOGGLE SIDEBAR ── */
#sbToggle{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:.15s;}
#sbToggle:hover{background:var(--bg2);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);z-index:999;background:#111827;color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── OBJ COMBO ── */
.obj-combo{display:flex;flex-direction:column;gap:5px;}
.obj-combo-row{display:flex;gap:5px;align-items:center;}
.obj-combo-row .sb-sel{flex:1;min-width:0;}
.obj-combo-new{display:inline-flex;align-items:center;justify-content:center;width:28px;height:32px;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--accent);font-size:14px;font-weight:800;text-decoration:none;flex-shrink:0;transition:.15s;}
.obj-combo-new:hover{background:var(--accent-bg);border-color:var(--accent);}

/* ── PRINT ── */
@media print{.g-nav,.sb,.tabs,.topbar .btn,.no-print{display:none!important;}.app{display:block;height:auto;}.main{display:block;overflow:visible;}.tab-content{overflow:visible;padding:10px;}}

/* ── ACTIVITY LOG ── */
.log-list{display:flex;flex-direction:column;gap:0;}
.log-entry{display:grid;grid-template-columns:140px 1fr;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12.5px;transition:background .1s;}
.log-entry:hover{background:var(--surface2);}
.log-meta{display:flex;flex-direction:column;gap:2px;}
.log-time{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;}
.log-user{font-size:10.5px;font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-msg{color:var(--text2);line-height:1.5;}
.log-msg .log-point{font-weight:700;color:var(--text);background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:11px;}
.log-msg .log-val{font-weight:700;}
.log-msg .log-val.v-yes{color:var(--green);}
.log-msg .log-val.v-partial{color:var(--amber);}
.log-msg .log-val.v-no{color:var(--red);}
.log-msg .log-val.v-na{color:var(--muted2);}
.log-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.log-count{font-size:12px;color:var(--muted);font-weight:600;}
</style>
</head>

// ── State ────────────────────────────────────────────────────
let state=loadState();
let activeMod='A';
let activeTab='gvp';
let commentPtId=null;

function loadState(){
  const raw=(typeof _GemaDB!=='undefined'?(_GemaDB.c[STORAGE_KEY]??null):null);
  if(raw){try{const st=JSON.parse(raw);if(!st.log)st.log=[];return st;}catch(e){}}
  return {objektId:'',pruefDatum:'',enabledModules:['A','B','C','D','E','L','M'],checks:{},comments:{},risks:{},measures:[],review:{},log:[],lastSaved:null};
}
function saveState(notify){
  state.lastSaved=new Date().toISOString();
  try{if(typeof _GemaDB!=='undefined')_GemaDB.save(STORAGE_KEY,JSON.stringify(state));}catch(e){}
  if(notify)toast('💾 Gespeichert');
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));}
let toastT;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2000);}

// ── Activity Log ─────────────────────────────────────────────
function logActivity(msg){
  if(!state.log)state.log=[];
  let user='–';
  try{const u=typeof GemaAuth!=='undefined'&&GemaAuth.getCurrentUser();if(u)user=u.name||u.username||'–';}catch(e){}
  state.log.unshift({ts:new Date().toISOString(),user:user,msg:msg});
  if(state.log.length>500)state.log.length=500;
}
const STATUS_LABELS={yes:'Erfüllt',partial:'Teilweise',no:'Nicht erfüllt',na:'Nicht anwendbar'};
const STATUS_CLS={yes:'v-yes',partial:'v-partial',no:'v-no',na:'v-na'};

function renderLog(){
  const logs=state.log||[];
  let html=`<div class="log-toolbar"><span class="log-count">${logs.length} Einträge</span><button class="btn sm" onclick="clearLog()">🗑 Log leeren</button></div>`;
  if(!logs.length){
    html+=`<div class="empty"><div class="empty-icon">📜</div><div class="empty-text">Noch keine Aktivitäten aufgezeichnet.</div></div>`;
  } else {
    html+='<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;"><div class="log-list">';
    logs.forEach(l=>{
      const d=new Date(l.ts);
      const date=d.toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric'});
      const time=d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
      html+=`<div class="log-entry"><div class="log-meta"><span class="log-time">${esc(date)} ${esc(time)}</span><span class="log-user">${esc(l.user)}</span></div><div class="log-msg">${l.msg}</div></div>`;
    });
    html+='</div></div>';
  }
  document.getElementById('pane-log').innerHTML=html;
}
function clearLog(){
  if(!confirm('Aktivitätslog wirklich leeren?'))return;
  state.log=[];saveState(false);renderLog();
}

// ── Objekt Dropdown ──────────────────────────────────────────
function populateObjekt(){
  const sel=document.getElementById('objektDD');
  const cur=sel.value||state.objektId;
  sel.innerHTML='<option value="">– Wählen –</option>';
  if(typeof GemaObjekte!=='undefined'){
    GemaObjekte.getAll().forEach(o=>{
      const opt=document.createElement('option');opt.value=o.id;
      opt.textContent=[o.name,o.ort].filter(Boolean).join(' · ');
      sel.appendChild(opt);
    });
  }
  if(cur)sel.value=cur;
}

// ── Module Tree ──────────────────────────────────────────────
function renderTree(){
  const tree=document.getElementById('modTree');
  let html='';
  let lastCat='';
  W12.forEach(m=>{
    if(m.cat!==lastCat){html+=`<div class="mod-cat">${esc(m.cat)}</div>`;lastCat=m.cat;}
    const enabled=state.enabledModules.includes(m.id);
    const checked=m.pts.filter(p=>state.checks[p.id]).length;
    const total=m.pts.length;
    const pct=total?Math.round(checked/total*100):0;
    const done=pct===100;
    html+=`<div class="mod-item${m.id===activeMod?' active':''}${!enabled?' na':''}" data-mod="${m.id}" onclick="switchMod('${m.id}')">
      <span class="mod-id">${m.id}</span>
      <span class="mod-name">${esc(m.name)}</span>
      <span class="mod-prog${done?' done':''}">${enabled?pct+'%':'–'}</span>
    </div>`;
  });
  tree.innerHTML=html;
}

function switchMod(id){
  activeMod=id;
  renderTree();
  renderTopbar();
  renderGVP();
  renderRisk();
  renderMeasures();
}

// ── Topbar ───────────────────────────────────────────────────
function renderTopbar(){
  const m=W12.find(x=>x.id===activeMod);
  if(!m)return;
  document.getElementById('topTitle').textContent=`Modul ${m.id}: ${m.name}`;
  const checked=m.pts.filter(p=>state.checks[p.id]).length;
  document.getElementById('topBadge').textContent=`${checked} / ${m.pts.length}`;
}

// ── Progress ─────────────────────────────────────────────────
function renderProgress(){
  let done=0,total=0;
  W12.forEach(m=>{
    if(!state.enabledModules.includes(m.id))return;
    m.pts.forEach(p=>{total++;if(state.checks[p.id])done++;});
  });
  const pct=total?Math.round(done/total*100):0;
  const fill=document.getElementById('progressFill');
  fill.style.width=pct+'%';
  fill.className='progress-fill'+(pct>=70?' good':'');
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressNums').textContent=`${done} / ${total}`;
}

// ── GVP Checklist ────────────────────────────────────────────
function renderGVP(){
  const m=W12.find(x=>x.id===activeMod);
  if(!m){document.getElementById('pane-gvp').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Modul wählen</div></div>';return;}
  let html=`<div class="check-group open">
    <div class="check-group-hd" onclick="this.parentElement.classList.toggle('open')">
      <span class="check-group-icon">${m.icon}</span>
      <span class="check-group-title">Modul ${m.id}: ${esc(m.name)}</span>
      <span class="check-group-count">${m.pts.length} Punkte</span>
      <span class="check-group-arrow">▶</span>
    </div>
    <div class="check-group-body">`;
  m.pts.forEach(p=>{
    const v=state.checks[p.id]||'';
    const hasNote=!!(state.comments[p.id]||'').trim();
    html+=`<div class="check-row">
      <div class="check-id">${p.id}</div>
      <div class="check-title">${esc(p.t)}</div>
      <div class="check-status">
        <button class="${v==='yes'?'sel-yes':''}" onclick="setCheck('${p.id}','yes')" title="Erfüllt">✓</button>
        <button class="${v==='partial'?'sel-partial':''}" onclick="setCheck('${p.id}','partial')" title="Teilweise">◐</button>
        <button class="${v==='no'?'sel-no':''}" onclick="setCheck('${p.id}','no')" title="Nicht erfüllt">✗</button>
        <button class="${v==='na'?'sel-na':''}" onclick="setCheck('${p.id}','na')" title="Nicht anwendbar">–</button>
      </div>
      <button class="check-comment${hasNote?' has-note':''}" onclick="openComment('${p.id}')" title="Kommentar">💬</button>
    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('pane-gvp').innerHTML=html;
}

function setCheck(ptId,val){
  const prev=state.checks[ptId];
  if(prev===val){delete state.checks[ptId];logActivity(`<span class="log-point">${ptId}</span> Status zurückgesetzt`);}
  else{state.checks[ptId]=val;logActivity(`<span class="log-point">${ptId}</span> → <span class="log-val ${STATUS_CLS[val]||''}">${STATUS_LABELS[val]||val}</span>`);}
  saveState(false);
  renderGVP();renderTree();renderTopbar();renderProgress();renderRisk();
}

// ── Comments ─────────────────────────────────────────────────
function openComment(ptId){
  commentPtId=ptId;
  document.getElementById('commentTitle').textContent='Kommentar zu '+ptId;
  document.getElementById('commentText').value=state.comments[ptId]||'';
  document.getElementById('commentModal').classList.add('open');
  setTimeout(()=>document.getElementById('commentText').focus(),100);
}
function closeComment(){document.getElementById('commentModal').classList.remove('open');commentPtId=null;}
function saveComment(){
  if(!commentPtId)return;
  const txt=document.getElementById('commentText').value.trim();
  if(txt){state.comments[commentPtId]=txt;logActivity(`Kommentar zu <span class="log-point">${commentPtId}</span> gespeichert`);}
  else{delete state.comments[commentPtId];logActivity(`Kommentar zu <span class="log-point">${commentPtId}</span> gelöscht`);}
  saveState(false);closeComment();renderGVP();
}

// ── Risk Management ──────────────────────────────────────────
function renderRisk(){
  const m=W12.find(x=>x.id===activeMod);
  if(!m){document.getElementById('pane-risk').innerHTML='';return;}
  // Show only points that are not fully compliant
  const risky=m.pts.filter(p=>state.checks[p.id]==='no'||state.checks[p.id]==='partial');
  if(!risky.length){
    document.getElementById('pane-risk').innerHTML=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Alle GVP-Vorgaben in Modul ${m.id} erfüllt.<br>Keine Risikoanalyse erforderlich.</div></div>`;
    return;
  }
  let html=`<div style="margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.5;">Gefahrenanalyse und Risikobewertung für nicht oder nur teilweise erfüllte Vorgaben gemäss HACCP-Prinzipien (W12 Kap. 3).</div>`;
  html+=`<div style="overflow-x:auto;"><table class="risk-table">
    <thead><tr><th style="width:50px;">Punkt</th><th>Vorgabe</th><th style="width:100px;">Gefährdung</th><th style="width:90px;">Eintritt (E)</th><th style="width:90px;">Schaden (S)</th><th style="width:60px;">Risiko</th><th style="width:60px;">CCP?</th></tr></thead><tbody>`;
  risky.forEach(p=>{
    const r=state.risks[p.id]||{};
    const e=parseInt(r.e)||0,s=parseInt(r.s)||0;
    const score=e*s;
    const cls=score>=9?'risk-crit':score>=6?'risk-high':score>=3?'risk-med':score>0?'risk-low':'';
    html+=`<tr>
      <td><span class="check-id">${p.id}</span></td>
      <td style="font-weight:600;font-size:12px;">${esc(p.t)}</td>
      <td><input class="risk-sel" value="${esc(r.gefahr||'')}" placeholder="Beschreibung…" onchange="setRisk('${p.id}','gefahr',this.value)"/></td>
      <td><select class="risk-sel" onchange="setRisk('${p.id}','e',this.value)">
        <option value="">–</option><option value="1"${e===1?' selected':''}>1 Unwahrsch.</option><option value="2"${e===2?' selected':''}>2 Möglich</option><option value="3"${e===3?' selected':''}>3 Wahrsch.</option><option value="4"${e===4?' selected':''}>4 Sehr wahrsch.</option>
      </select></td>
      <td><select class="risk-sel" onchange="setRisk('${p.id}','s',this.value)">
        <option value="">–</option><option value="1"${s===1?' selected':''}>1 Gering</option><option value="2"${s===2?' selected':''}>2 Mässig</option><option value="3"${s===3?' selected':''}>3 Schwer</option><option value="4"${s===4?' selected':''}>4 Katastrophal</option>
      </select></td>
      <td style="text-align:center;">${score?`<span class="risk-score ${cls}">${score}</span>`:'-'}</td>
      <td style="text-align:center;"><input type="checkbox" ${r.ccp?'checked':''} onchange="setRisk('${p.id}','ccp',this.checked)"/></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<div style="margin-top:12px;font-size:11px;color:var(--muted);line-height:1.5;">Risiko = E × S. Ab Risiko ≥ 6: Massnahmen zwingend. CCP = Kritischer Kontrollpunkt (ständige Überwachung nötig).</div>`;
  document.getElementById('pane-risk').innerHTML=html;
}

function setRisk(ptId,key,val){
  if(!state.risks[ptId])state.risks[ptId]={};
  state.risks[ptId][key]=val;
  const labels={e:'Eintritt',s:'Schaden',gefahr:'Gefährdung',ccp:'CCP'};
  logActivity(`Risiko <span class="log-point">${ptId}</span> ${labels[key]||key}: ${val===true?'Ja':val===false?'Nein':val}`);
  saveState(false);renderRisk();
}

// ── Measures ─────────────────────────────────────────────────
function renderMeasures(){
  const m=W12.find(x=>x.id===activeMod);
  if(!m){document.getElementById('pane-measures').innerHTML='';return;}
  const risky=m.pts.filter(p=>state.checks[p.id]==='no'||state.checks[p.id]==='partial');
  const measures=state.measures.filter(x=>x.modId===activeMod);
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div style="font-size:12px;color:var(--muted);">Massnahmen zur Behebung von Schwachstellen in Modul ${m.id}</div>
    <button class="btn primary sm" onclick="addMeasure()">+ Massnahme</button>
  </div>`;
  if(!measures.length&&!risky.length){
    html+=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Keine offenen Massnahmen.</div></div>`;
  } else {
    measures.forEach((ms,idx)=>{
      const prioCol=ms.prio==='hoch'?'background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)':ms.prio==='mittel'?'background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)':'background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)';
      html+=`<div class="measure-card">
        <div class="measure-hd">
          <span class="measure-id">${ms.ptId||'–'}</span>
          <span class="measure-title">${esc(ms.title||'Neue Massnahme')}</span>
          <span class="measure-prio" style="${prioCol}">${ms.prio||'–'}</span>
          <button class="btn sm" style="margin-left:auto;" onclick="removeMeasure(${idx})">✗</button>
        </div>
        <div class="measure-grid">
          <div class="sb-field"><div class="sb-label">Bezug</div><select class="sb-sel" onchange="updMeasure(${idx},'ptId',this.value)">
            <option value="">–</option>${risky.map(p=>`<option value="${p.id}"${ms.ptId===p.id?' selected':''}>${p.id}: ${esc(p.t)}</option>`).join('')}
          </select></div>
          <div class="sb-field"><div class="sb-label">Priorität</div><select class="sb-sel" onchange="updMeasure(${idx},'prio',this.value)">
            <option value="niedrig"${ms.prio==='niedrig'?' selected':''}>Niedrig</option><option value="mittel"${ms.prio==='mittel'?' selected':''}>Mittel</option><option value="hoch"${ms.prio==='hoch'?' selected':''}>Hoch</option>
          </select></div>
          <div class="sb-field"><div class="sb-label">Massnahme</div><input class="sb-inp" value="${esc(ms.title||'')}" onchange="updMeasure(${idx},'title',this.value)" placeholder="Beschreibung…"/></div>
          <div class="sb-field"><div class="sb-label">Verantwortlich</div><input class="sb-inp" value="${esc(ms.owner||'')}" onchange="updMeasure(${idx},'owner',this.value)" placeholder="Person/Firma"/></div>
          <div class="sb-field"><div class="sb-label">Termin</div><input class="sb-inp" type="date" value="${ms.deadline||''}" onchange="updMeasure(${idx},'deadline',this.value)"/></div>
          <div class="sb-field"><div class="sb-label">Status</div><select class="sb-sel" onchange="updMeasure(${idx},'status',this.value)">
            <option value="offen"${ms.status==='offen'?' selected':''}>Offen</option><option value="laufend"${ms.status==='laufend'?' selected':''}>In Bearbeitung</option><option value="erledigt"${ms.status==='erledigt'?' selected':''}>Erledigt</option>
          </select></div>
        </div>
      </div>`;
    });
  }
  document.getElementById('pane-measures').innerHTML=html;
}
function addMeasure(){
  state.measures.push({modId:activeMod,ptId:'',title:'',prio:'mittel',owner:'',deadline:'',status:'offen'});
  logActivity(`Neue Massnahme in Modul ${activeMod} erstellt`);
  saveState(false);renderMeasures();
}
function removeMeasure(idx){
  const ms=state.measures.filter(x=>x.modId===activeMod);
  const title=ms[idx]?.title||'–';
  const globalIdx=state.measures.indexOf(ms[idx]);
  if(globalIdx>=0)state.measures.splice(globalIdx,1);
  logActivity(`Massnahme "${esc(title)}" in Modul ${activeMod} gelöscht`);
  saveState(false);renderMeasures();
}
function updMeasure(localIdx,key,val){
  const ms=state.measures.filter(x=>x.modId===activeMod);
  const globalIdx=state.measures.indexOf(ms[localIdx]);
  if(globalIdx>=0){
    state.measures[globalIdx][key]=val;
    const labels={ptId:'Bezug',prio:'Priorität',title:'Beschreibung',owner:'Verantwortlich',deadline:'Termin',status:'Status'};
    logActivity(`Massnahme in Modul ${activeMod} geändert: ${labels[key]||key} → ${val}`);
    saveState(false);renderMeasures();
  }
}
