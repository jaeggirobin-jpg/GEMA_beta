<html lang="de">
<head>
<script src="gema_auth.js"></script>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GEMA – Schnellausschreibung</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f6fb;--bg2:#edf0f7;--sur:#fff;--sur2:#f8faff;--brd:#e2e7f0;--brd2:#cdd4e4;--txt:#111827;--txt2:#374151;--mut:#6b7280;--mut2:#9ca3af;--blue:#2563eb;--blue-bg:#eff4ff;--blue-bd:#bfcfff;--blue-dk:#1d4ed8;--grn:#16a34a;--grn-bg:#f0fdf4;--grn-bd:#bbf7d0;--red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;--amb:#d97706;--amb-bg:#fffbeb;--amb-bd:#fde68a;--acc:#2563eb;--acc-bg:#eff4ff;--acc-bd:#bfcfff;--r:14px;--r-sm:9px;--r-lg:20px;--sh-sm:0 1px 4px rgba(0,0,0,.07);--sh:0 4px 16px rgba(0,0,0,.08);--sh-lg:0 20px 60px rgba(0,0,0,.16);--sans:"DM Sans",ui-sans-serif,system-ui,sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}

/* Nav */
.g-nav{background:#fff;border-bottom:1.5px solid var(--brd);position:sticky;top:0;z-index:300}.g-nav-inner{padding:0 24px;height:52px;display:flex;align-items:center;gap:16px}.g-nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}.g-nav-mark{height:28px;display:flex;align-items:center}.g-nav-bc{display:flex;align-items:center;gap:6px;font-size:13px;margin-left:4px}.bc-sep{color:var(--mut2)}.bc-cat{color:var(--mut);font-weight:500;text-decoration:none}.bc-cur{color:var(--txt2);font-weight:700}.g-nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}.g-nav-btn{font-size:12px;font-weight:600;color:var(--mut);background:var(--bg2);border:1.5px solid var(--brd);border-radius:8px;padding:5px 12px;text-decoration:none;transition:.15s;cursor:pointer}.g-nav-btn:hover{background:var(--brd);color:var(--txt)}

/* Page */
.g-page{max-width:1100px;margin:0 auto;padding:24px}

/* Card */
.card{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh-sm);margin-bottom:16px;overflow:hidden}.card-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--brd);gap:10px;flex-wrap:wrap}.card-hd h3{font-size:14px;font-weight:800}.card-bd{padding:16px 18px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;font-family:var(--sans);border:none;vertical-align:middle}
.btn-p{background:var(--acc);color:#fff;padding:9px 18px}.btn-p:hover{background:var(--blue-dk)}
.btn-s{background:var(--sur);color:var(--txt2);border:1.5px solid var(--brd2);padding:8px 14px}.btn-s:hover{background:var(--bg2);color:var(--acc)}
.btn-g{background:transparent;color:var(--mut);border:1.5px solid var(--brd);padding:6px 12px}.btn-g:hover{background:var(--bg2);color:var(--txt)}
.btn-d{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-bd);padding:6px 12px}.btn-d:hover{background:var(--red);color:#fff}
.btn-ok{background:var(--grn);color:#fff;padding:9px 18px}.btn-ok:hover{background:#15803d}
.btn-sm{padding:6px 12px;font-size:12px}

/* Form */
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}.fl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt2)}.fc{padding:8px 11px;border:1.5px solid var(--brd2);border-radius:8px;font-size:13px;color:var(--txt);background:var(--sur);font-family:var(--sans);outline:none;transition:.15s;width:100%}.fc:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}.fc::placeholder{color:#cbd5e1}select.fc{cursor:pointer}textarea.fc{resize:vertical;min-height:80px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.t-bl{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}.t-gr{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-bd)}.t-am{background:var(--amb-bg);color:var(--amb);border:1px solid var(--amb-bd)}.t-rd{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}.t-gy{background:var(--bg2);color:var(--mut);border:1px solid var(--brd2)}

/* Stats */
.sr{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;margin-bottom:24px}.sc{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-sm)}.sc-l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:6px}.sc-v{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}.sc-s{font-size:12px;color:var(--mut)}

/* Table */
.dt{width:100%;border-collapse:collapse;font-size:13px}.dt th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);padding:9px 14px;border-bottom:2px solid var(--brd);text-align:left}.dt td{padding:10px 14px;border-bottom:1px solid var(--brd);vertical-align:middle}.dt tr:hover td{background:var(--bg)}.tr{text-align:right}.mono{font-variant-numeric:tabular-nums}

/* Info */
.ip{background:var(--blue-bg);border:1.5px solid var(--blue-bd);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--blue-dk);line-height:1.6}.ip strong{font-weight:800}
.wp{background:var(--amb-bg);border:1.5px solid var(--amb-bd);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;font-size:13px;color:#92400e;line-height:1.6}
.gp{background:var(--grn-bg);border:1.5px solid var(--grn-bd);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;font-size:13px;color:#166534;line-height:1.6}

/* Empty */
.es{text-align:center;padding:48px 24px;color:var(--mut)}.es .ei{font-size:48px;margin-bottom:12px;display:block}.es .et{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:4px}.es p{font-size:13px;margin-bottom:16px}

/* Gewerk row */
.gw-row{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;transition:.12s}.gw-row:hover{box-shadow:var(--sh-sm)}
.gw-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}.gw-hd strong{font-size:15px;flex:1}

/* Offert row */
.off-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--sur);border:1.5px solid var(--brd);border-radius:9px;margin-bottom:8px;transition:.12s}.off-row:hover{box-shadow:var(--sh-sm)}

/* Contact */
.cr{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--sur);border:1.5px solid var(--brd);border-radius:9px;margin-bottom:8px}.cr:hover{box-shadow:var(--sh-sm)}.ca{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;font-weight:800;color:#fff}.ci{flex:1;min-width:0}.cn{font-weight:700;font-size:13px}.cd{font-size:11px;color:var(--mut)}

/* Modal */
.mo{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}.mo.open{display:flex}.ml{background:var(--sur);border-radius:var(--r-lg);max-width:560px;width:100%;max-height:85vh;overflow:auto;box-shadow:var(--sh-lg)}.ml-hd{padding:18px 24px;border-bottom:1.5px solid var(--brd);display:flex;align-items:center;gap:12px}.ml-hd h2{font-size:16px;font-weight:800;flex:1}.ml-bd{padding:20px 24px}.ml-ft{padding:14px 24px;border-top:1.5px solid var(--brd);display:flex;gap:8px;justify-content:flex-end}.cl-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--mut);padding:4px}

/* Tutorial */
.tut-ov{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}.tut-ov.open{display:flex}.tut-ml{background:var(--sur);border-radius:20px;max-width:580px;width:100%;max-height:90vh;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.2)}.tut-hd{padding:18px 24px;border-bottom:1.5px solid var(--brd);display:flex;align-items:center;gap:12px}.tut-hd h2{font-size:16px;font-weight:800;flex:1}.tut-dots{display:flex;gap:5px}.tut-dot{width:8px;height:8px;border-radius:50%;background:var(--brd2);transition:.2s}.tut-dot.active{background:var(--acc);width:20px;border-radius:4px}.tut-bd{padding:24px;min-height:260px}.tut-step{display:none}.tut-step.active{display:block}.tut-step h3{font-size:17px;font-weight:800;margin-bottom:6px}.tut-step p{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:12px}.tut-vis{border-radius:10px;border:1.5px solid var(--brd);overflow:hidden;background:var(--bg);padding:12px;margin-bottom:8px}.tut-ft{padding:14px 24px;border-top:1.5px solid var(--brd);display:flex;align-items:center;gap:8px}.tut-ft .tut-ct{font-size:12px;color:var(--mut);flex:1}.tut-ft button{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1.5px solid var(--brd2);background:var(--sur);color:var(--txt);transition:.15s}.tut-ft button:hover{background:var(--bg2)}.tut-ft button.pri{background:var(--acc);border-color:var(--acc);color:#fff}

/* Vergleich */
.best{background:var(--grn-bg)!important;font-weight:700;color:var(--grn)}

/* Planer hint */
.planer-hint{background:linear-gradient(135deg,#eff4ff 0%,#f5f3ff 100%);border:1.5px solid var(--blue-bd);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.planer-hint .ph-icon{font-size:28px;flex-shrink:0}.planer-hint .ph-text{flex:1;font-size:13px;color:var(--txt2);line-height:1.5}.planer-hint .ph-text strong{color:var(--blue-dk)}
.planer-hint .ph-btn{font-size:12px;font-weight:700;color:var(--acc);text-decoration:none;white-space:nowrap;border:1.5px solid var(--blue-bd);padding:6px 14px;border-radius:8px;transition:.15s}.planer-hint .ph-btn:hover{background:var(--acc);color:#fff}

@media(max-width:768px){.sr{grid-template-columns:1fr 1fr}.g2,.g3{grid-template-columns:1fr}}
@media print{.g-nav,.no-print{display:none!important}.g-page{max-width:100%;padding:10px}}
</style>
</head>

<!-- Modal: Neue Schnellausschreibung -->
<div class="mo" id="mNew"><div class="ml">
  <div class="ml-hd"><h2>Neue Schnellausschreibung</h2><button class="cl-btn" onclick="cM('mNew')">✕</button></div>
  <div class="ml-bd">
    <div class="fg"><label class="fl">Projekt</label><input type="text" class="fc" id="naProjekt" placeholder="z.B. Umbau Badezimmer Müller, Arlesheim"/></div>
    <div class="fg"><label class="fl">Adresse</label><input type="text" class="fc" id="naAdresse" placeholder="Strasse Nr., PLZ Ort"/></div>
    <div class="fg"><label class="fl">Gewerke</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px" id="naGewWrap">
        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s"><input type="checkbox" value="Sanitär" checked style="accent-color:var(--acc)"/> Sanitär</label>
        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s"><input type="checkbox" value="Heizung" style="accent-color:var(--acc)"/> Heizung</label>
        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s"><input type="checkbox" value="Elektro" style="accent-color:var(--acc)"/> Elektro</label>
        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s"><input type="checkbox" value="Lüftung" style="accent-color:var(--acc)"/> Lüftung</label>
        <label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s"><input type="checkbox" value="Küche" style="accent-color:var(--acc)"/> Küche</label>
      </div>
    </div>
    <div class="fg"><label class="fl">Eingabefrist</label><input type="date" class="fc" id="naFrist"/></div>
  </div>
  <div class="ml-ft"><button class="btn btn-g" onclick="cM('mNew')">Abbrechen</button><button class="btn btn-p" onclick="createSA()">Erstellen</button></div>
</div></div>

<!-- Modal: Gewerk bearbeiten -->
<div class="mo" id="mGew"><div class="ml">
  <div class="ml-hd"><h2 id="mGewTitle">Gewerk bearbeiten</h2><button class="cl-btn" onclick="cM('mGew')">✕</button></div>
  <div class="ml-bd">
    <div class="fg"><label class="fl">Beschrieb</label><textarea class="fc" id="gwDesc" rows="6" placeholder="Was soll gemacht werden? Material, Umfang, besondere Anforderungen…"></textarea></div>

</div></div>

<script>
// ═══════════════════════════════════════════════
// GEMA Schnellausschreibung — für Architekten
// ═══════════════════════════════════════════════
const SK='gema_schnellausschreibung_v1';
let S={
  ausschreibungen:[], // [{id,projekt,adresse,gewerke:[{name,beschrieb,beilagen:[],liefRef}],frist,status,unternehmer:[{id,firma,person,email,tel}],offerten:[{unternehmerId,gewerk,preis}],vergabe}]
};

function sv(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}
function ld(){try{const r=localStorage.getItem(SK);if(r)Object.assign(S,JSON.parse(r));}catch(e){}if(!S.ausschreibungen)S.ausschreibungen=[];}
function E(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fC(v){if(!v||v===0)return'–';return'CHF '+v.toLocaleString('de-CH',{minimumFractionDigits:0,maximumFractionDigits:0});}
function oM(id){document.getElementById(id).classList.add('open');}
function cM(id){document.getElementById(id).classList.remove('open');}
function toast(m,t){const c=document.getElementById('toasts'),d=document.createElement('div');d.style.cssText=`padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;background:${t==='error'?'var(--red)':'var(--grn)'};box-shadow:var(--sh);max-width:360px`;d.textContent=m;c.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(()=>d.remove(),300);},3500);}

let _activeId=null;
function curA(){return S.ausschreibungen.find(a=>a.id===_activeId);}

// ── RENDER ──
function render(){
  const el=document.getElementById('PA');
  if(_activeId&&curA())el.innerHTML=renderDetail();
  else el.innerHTML=renderList();
}

function renderList(){
  let h=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><button class="btn btn-p btn-sm" onclick="tutOpen()">🎓 So funktioniert's</button><span style="font-size:12px;color:var(--mut)">Schnell & einfach ausschreiben</span></div>`;

  h+=`<div class="planer-hint"><span class="ph-icon">💡</span><div class="ph-text">Für detaillierte Ausschreibungen mit Leistungsverzeichnis, Einzelpositionen und CRBX/E1S empfehlen wir einen <strong>Sanitärplaner</strong>. Die Schnellausschreibung eignet sich für kleine bis mittlere Projekte.</div><a class="ph-btn" href="pm_ausschreibungsunterlagen.html">→ Planer-Modul</a></div>`;

  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:700">Meine Ausschreibungen</h2><button class="btn btn-p" onclick="oM('mNew')">+ Neue Schnellausschreibung</button></div>`;

  if(!S.ausschreibungen.length){
    h+=`<div class="es"><span class="ei">⚡</span><div class="et">Noch keine Ausschreibungen</div><p>Erstelle in wenigen Minuten eine Schnellausschreibung und lade Unternehmer ein.</p><button class="btn btn-p" onclick="oM('mNew')">+ Loslegen</button></div>`;
    return h;
  }

  h+=S.ausschreibungen.map(a=>{
    const nOff=a.offerten?.length||0;const nUN=a.unternehmer?.length||0;
    return `<div class="gw-row" style="cursor:pointer" onclick="_activeId='${a.id}';render()">
      <div class="gw-hd"><strong>${E(a.projekt)}</strong>
        <span class="tag ${a.status==='vergeben'?'t-gr':a.status==='aktiv'?'t-bl':'t-am'}">${a.status==='vergeben'?'Vergeben':a.status==='aktiv'?'Aktiv':'Entwurf'}</span>
      </div>
      <div style="font-size:12px;color:var(--mut)">${E(a.adresse)} · ${a.gewerke.map(g=>g.name).join(', ')} · Frist: ${a.frist||'—'}</div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:12px"><span>${nUN} Unternehmer</span><span>${nOff} Offerten</span></div>
    </div>`;
  }).join('');
  return h;
}

function renderDetail(){
  const a=curA();if(!a)return '';
  const nOff=a.offerten?.length||0;const nUN=a.unternehmer?.length||0;
  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px"><button class="btn btn-g btn-sm" onclick="_activeId=null;render()">← Zurück</button><h2 style="font-size:20px;font-weight:700;flex:1">${E(a.projekt)}</h2><span class="tag ${a.status==='vergeben'?'t-gr':a.status==='aktiv'?'t-bl':'t-am'}">${a.status==='vergeben'?'Vergeben':a.status==='aktiv'?'Aktiv':'Entwurf'}</span></div>`;

  h+=`<div class="sr"><div class="sc"><div class="sc-l">Adresse</div><div style="font-size:14px;font-weight:700">${E(a.adresse)}</div></div><div class="sc"><div class="sc-l">Gewerke</div><div class="sc-v">${a.gewerke.length}</div></div><div class="sc"><div class="sc-l">Unternehmer</div><div class="sc-v">${nUN}</div></div><div class="sc"><div class="sc-l">Offerten</div><div class="sc-v">${nOff}</div></div></div>`;

  // Gewerke
  h+=`<div class="card"><div class="card-hd"><h3>Gewerke & Beschrieb</h3></div><div class="card-bd">`;
  h+=a.gewerke.map((g,gi)=>`<div class="gw-row">
    <div class="gw-hd"><strong>${E(g.name)}</strong>
      ${g.liefRef?`<span class="tag t-am" style="font-size:10px">📎 ${E(g.liefRef)}</span>`:''}
      <button class="btn btn-g btn-sm" onclick="editGew(${gi})">✎</button>
    </div>
    ${g.beschrieb?`<p style="font-size:13px;color:var(--txt2);white-space:pre-line;line-height:1.6">${E(g.beschrieb)}</p>`:`<p style="font-size:12px;color:var(--mut);font-style:italic">Noch kein Beschrieb — klicke ✎ um einen zu erfassen.</p>`}
    ${g.beilagen?.length?`<div style="margin-top:6px;font-size:11px;color:var(--mut)">${g.beilagen.map(b=>'📄 '+E(b)).join(' · ')}</div>`:''}
  </div>`).join('');
  h+=`</div></div>`;

  // Unternehmer
  h+=`<div class="card"><div class="card-hd"><h3>Unternehmer</h3><button class="btn btn-p btn-sm" onclick="oM('mInvite')">+ Einladen</button></div><div class="card-bd">`;
  if(!a.unternehmer?.length)h+=`<p style="color:var(--mut);text-align:center;padding:12px">Noch keine Unternehmer eingeladen.</p>`;
  else h+=a.unternehmer.map(u=>{
    const hasOff=a.offerten?.some(o=>o.unternehmerId===u.id);
    return `<div class="cr"><div class="ca" style="background:var(--grn)">${u.firma.charAt(0)}</div><div class="ci"><div class="cn">${E(u.firma)}</div><div class="cd">${E(u.person)} · ${E(u.email)}</div></div>${hasOff?'<span class="tag t-gr">✓ Offerte</span>':'<span class="tag t-gy">Offen</span>'}<button class="btn btn-d btn-sm" onclick="rmUN('${u.id}')">✕</button></div>`;
  }).join('');
  h+=`</div></div>`;

  // Offertvergleich
  if(nOff>0){
    h+=`<div class="card"><div class="card-hd"><h3>📊 Offertvergleich</h3>${a.status!=='vergeben'?`<button class="btn btn-ok btn-sm" onclick="openVergabe()">🏆 Vergabe</button>`:''}</div><div class="card-bd">`;
    h+=`<table class="dt"><thead><tr><th>Gewerk</th>${a.unternehmer.filter(u=>a.offerten.some(o=>o.unternehmerId===u.id)).map(u=>`<th class="tr">${E(u.firma)}</th>`).join('')}</tr></thead><tbody>`;
    const offerUN=a.unternehmer.filter(u=>a.offerten.some(o=>o.unternehmerId===u.id));
    let totals=offerUN.map(()=>0);
    a.gewerke.forEach(g=>{
      const prices=offerUN.map((u,i)=>{const o=a.offerten.find(o=>o.unternehmerId===u.id&&o.gewerk===g.name);const p=o?o.preis:0;totals[i]+=p;return p;});
      const valid=prices.filter(p=>p>0);const min=valid.length?Math.min(...valid):0;
      h+=`<tr><td><strong>${E(g.name)}</strong></td>${prices.map(p=>`<td class="tr mono ${p>0&&p===min&&valid.length>1?'best':''}">${p?fC(p):'–'}</td>`).join('')}</tr>`;
    });
    const minT=Math.min(...totals.filter(t=>t>0));
    h+=`<tr style="font-weight:800;border-top:2px solid var(--brd)"><td>Total</td>${totals.map(t=>`<td class="tr mono ${t>0&&t===minT&&offerUN.length>1?'best':''}">${fC(t)}</td>`).join('')}</tr>`;
    h+=`</tbody></table></div></div>`;

    if(a.vergabe){
      const winner=a.unternehmer.find(u=>u.id===a.vergabe.winnerId);
      h+=`<div class="gp"><strong>🏆 Zuschlag erteilt an ${winner?E(winner.firma):'—'}</strong> am ${a.vergabe.datum}</div>`;
    }
  }

  // Demo: Offert-Eingabe (simuliert Unternehmer-Sicht)
  if(a.status==='aktiv'&&a.unternehmer?.length){
    h+=`<div class="card" style="border-color:var(--amb-bd)"><div class="card-hd" style="background:var(--amb-bg)"><h3 style="color:#92400e">💰 Offerte erfassen (Demo)</h3></div><div class="card-bd">`;
    h+=`<div class="fg"><label class="fl">Unternehmer</label><select class="fc" id="demoUN">${a.unternehmer.map(u=>`<option value="${u.id}">${E(u.firma)}</option>`).join('')}</select></div>`;
    a.gewerke.forEach((g,gi)=>{h+=`<div class="fg"><label class="fl">${E(g.name)} — Pauschalpreis CHF</label><input type="text" inputmode="decimal" class="fc" id="demoP${gi}" placeholder="0"/></div>`;});
    h+=`<button class="btn btn-p" onclick="submitDemo()">💰 Offerte einreichen</button></div></div>`;
  }

  return h;
}

// ── ACTIONS ──
function createSA(){
  const projekt=document.getElementById('naProjekt').value.trim();if(!projekt){toast('Projekt angeben','error');return;}
  const adresse=document.getElementById('naAdresse').value.trim();
  const gewerke=[...document.querySelectorAll('#naGewWrap input:checked')].map(cb=>({name:cb.value,beschrieb:'',beilagen:[],liefRef:''}));
  if(!gewerke.length){toast('Mind. 1 Gewerk wählen','error');return;}
  const frist=document.getElementById('naFrist').value;
  S.ausschreibungen.push({id:'sa-'+Date.now(),projekt,adresse,gewerke,frist,status:'entwurf',unternehmer:[],offerten:[],vergabe:null});
  sv();cM('mNew');toast('Erstellt: '+projekt);_activeId=S.ausschreibungen[S.ausschreibungen.length-1].id;render();
}

let _gwIdx=null;
function editGew(gi){const a=curA();if(!a)return;_gwIdx=gi;const g=a.gewerke[gi];document.getElementById('mGewTitle').textContent=g.name+' bearbeiten';document.getElementById('gwDesc').value=g.beschrieb||'';document.getElementById('gwLiefRef').value=g.liefRef||'';document.getElementById('gwFiles').value='';oM('mGew');}
function saveGew(){const a=curA();if(!a||_gwIdx===null)return;const g=a.gewerke[_gwIdx];g.beschrieb=document.getElementById('gwDesc').value.trim();g.liefRef=document.getElementById('gwLiefRef').value.trim();const fi=document.getElementById('gwFiles');if(fi.files.length)g.beilagen=[...fi.files].map(f=>f.name);sv();cM('mGew');toast('Gespeichert');render();}

function addUN(){const a=curA();if(!a)return;const firma=document.getElementById('invFirma').value.trim();if(!firma){toast('Firma angeben','error');return;}
  a.unternehmer.push({id:'un-'+Date.now(),firma,person:document.getElementById('invPerson').value.trim(),email:document.getElementById('invEmail').value.trim(),tel:document.getElementById('invTel').value.trim()});
  if(a.status==='entwurf')a.status='aktiv';
  sv();cM('mInvite');['invFirma','invPerson','invEmail','invTel'].forEach(x=>document.getElementById(x).value='');toast('📧 '+firma+' eingeladen');render();}
function rmUN(uid){const a=curA();if(!a||!confirm('Entfernen?'))return;a.unternehmer=a.unternehmer.filter(u=>u.id!==uid);a.offerten=(a.offerten||[]).filter(o=>o.unternehmerId!==uid);sv();render();}

function submitDemo(){const a=curA();if(!a)return;const uid=document.getElementById('demoUN').value;
  a.gewerke.forEach((g,gi)=>{const v=parseFloat(document.getElementById('demoP'+gi)?.value)||0;if(v>0){const existing=a.offerten.findIndex(o=>o.unternehmerId===uid&&o.gewerk===g.name);if(existing>=0)a.offerten[existing].preis=v;else a.offerten.push({unternehmerId:uid,gewerk:g.name,preis:v});}});
  sv();toast('✓ Offerte eingereicht');render();}

function openVergabe(){const a=curA();if(!a)return;const offerUN=a.unternehmer.filter(u=>a.offerten.some(o=>o.unternehmerId===u.id));
  document.getElementById('vgWinner').innerHTML=offerUN.map(u=>{const total=a.offerten.filter(o=>o.unternehmerId===u.id).reduce((s,o)=>s+o.preis,0);return `<option value="${u.id}">${E(u.firma)} — ${fC(total)}</option>`;}).join('');oM('mVergabe');}
function doVergabe(){const a=curA();if(!a)return;const wid=document.getElementById('vgWinner').value;const winner=a.unternehmer.find(u=>u.id===wid);
  a.status='vergeben';a.vergabe={winnerId:wid,datum:new Date().toISOString().split('T')[0],msgWin:document.getElementById('vgMsgWin').value,msgLose:document.getElementById('vgMsgLose').value};
  sv();cM('mVergabe');toast('🏆 Zuschlag an '+winner?.firma);render();}

// ── TUTORIAL ──
const TUT=[
  {t:'Ausschreibung erstellen',p:'Klicke auf <strong>+ Neue Schnellausschreibung</strong>. Gib Projekt, Adresse und die benötigten Gewerke an — z.B. Sanitär und Heizung. In unter einer Minute erstellt.',vis:'<div style="display:flex;gap:6px;flex-wrap:wrap"><span class="tag t-bl">Sanitär</span><span class="tag t-bl">Heizung</span><span class="tag t-bl">Elektro</span></div>'},
  {t:'Beschrieb pro Gewerk',p:'Klicke auf ✎ bei jedem Gewerk und beschreibe <strong>in eigenen Worten</strong>, was gemacht werden soll. Kein BKP-Wissen nötig — einfach Klartext. Optional: Pläne als Beilage und Lieferanten-Referenzen.',vis:'<div style="font-size:12px;color:var(--txt2);background:var(--sur);padding:8px;border-radius:6px;border:1px solid var(--brd)">"Neues Badezimmer EG: Badewanne, Dusche, WC, Lavabo. Material Geberit. Boiler 200L im Keller vorhanden."</div>'},
  {t:'Unternehmer einladen',p:'Lade 2–3 Unternehmer per E-Mail ein. Sie erhalten deinen Beschrieb und können einen <strong>Pauschalpreis pro Gewerk</strong> eingeben. Einfach und schnell.',vis:'<div style="font-size:12px"><div style="display:flex;align-items:center;gap:6px;padding:4px 0"><span style="width:6px;height:6px;border-radius:50%;background:var(--grn)"></span><strong>Meier Sanitär</strong> — ✓ Offerte</div><div style="display:flex;align-items:center;gap:6px;padding:4px 0"><span style="width:6px;height:6px;border-radius:50%;background:var(--amb)"></span><strong>Brunner HT</strong> — Offen</div></div>'},
  {t:'Vergleichen & vergeben',p:'Im Offertvergleich siehst du alle Pauschalpreise nebeneinander. Der günstigste wird <strong style="color:var(--grn)">grün</strong> markiert. Erteile den Zuschlag mit einem Klick — Absagen werden automatisch versendet.',vis:'<table style="width:100%;font-size:11px;border-collapse:collapse"><tr style="background:var(--bg2)"><td style="padding:3px 6px;font-weight:700">Gewerk</td><td style="padding:3px 6px;text-align:right;font-weight:700">Meier</td><td style="padding:3px 6px;text-align:right;font-weight:700">Brunner</td></tr><tr><td style="padding:3px 6px;border-bottom:1px solid var(--brd)">Sanitär</td><td style="padding:3px 6px;border-bottom:1px solid var(--brd);text-align:right;color:var(--grn);font-weight:700">18\'400</td><td style="padding:3px 6px;border-bottom:1px solid var(--brd);text-align:right">21\'600</td></tr></table>'},
  {t:'Für grössere Projekte',p:'Die Schnellausschreibung eignet sich für EFH, Umbauten und kleine Projekte. Für MFH, Gewerbe oder Projekte mit Leistungsverzeichnis (CRBX/E1S) empfehlen wir das <strong>Planer-Modul</strong> mit detaillierter BKP-Struktur und Einzelpositionen.',vis:'<a href="pm_ausschreibungsunterlagen.html" style="display:block;text-align:center;padding:12px;background:var(--blue-bg);border-radius:8px;color:var(--blue-dk);font-weight:700;text-decoration:none;font-size:13px">→ Zum Planer-Modul (Vollausschreibung)</a>'}
];
let _tC=0;
function tutOpen(){_tC=0;tutR();document.getElementById('tutOv').classList.add('open');}
function tutClose(){document.getElementById('tutOv').classList.remove('open');}
function tutNav(d){_tC+=d;if(_tC>=TUT.length){tutClose();return;}if(_tC<0)_tC=0;tutR();}
function tutR(){document.getElementById('tutBd').innerHTML=TUT.map((s,i)=>`<div class="tut-step${i===_tC?' active':''}"><div style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--acc);color:#fff;font-size:12px;font-weight:800;margin-bottom:10px">${i+1}</div><h3>${s.t}</h3><p>${s.p}</p>${s.vis?'<div class="tut-vis">'+s.vis+'</div>':''}</div>`).join('');
  document.getElementById('tutDots').innerHTML=TUT.map((_,i)=>`<div class="tut-dot${i===_tC?' active':''}"></div>`).join('');
  document.getElementById('tutCt').textContent=(_tC+1)+'/'+TUT.length;
  document.getElementById('tutPrev').style.display=_tC===0?'none':'';
  document.getElementById('tutNext').textContent=_tC===TUT.length-1?'🚀 Starten':'Weiter →';}

// ── INIT ──
ld();render();
</script>
<script src="gema_scroll.js"></script>
</body>
